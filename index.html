/* ════════════════════════════════════════════════════════════════
   DASHBOARD — Performance Summary
   ═══════════════════════════════════════════════════════════════ */

// Chart color palette (mapped to design tokens)
const CHART_COLORS = {
  primary:     '#2d4f3f',
  primaryLite: '#5a8073',
  success:     '#4a7a5a',
  warning:     '#c89832',
  danger:      '#b3463e',
  accent:      '#c97560',
  neutral:     '#a8b1ab',
  blue:        '#4a6f8a'
};

function svgDonut(segments, opts = {}) {
  const size = opts.size || 150;
  const thickness = opts.thickness || 22;
  const total = segments.reduce((a, b) => a + b.value, 0);
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;
  if (total === 0) {
    return `<svg viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${thickness}"/>
      <text x="${cx}" y="${cy + 5}" text-anchor="middle" font-size="13" fill="var(--ink-500)">ไม่มีข้อมูล</text>
    </svg>`;
  }
  let offset = 0;
  const arcs = segments.filter(s => s.value > 0).map(s => {
    const len = (s.value / total) * C;
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    offset += len;
    return arc;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg-elevated)" stroke-width="${thickness}"/>
    ${arcs}
    <text x="${cx}" y="${cy - 2}" text-anchor="middle" font-family="var(--font-display)" font-size="24" font-weight="600" fill="var(--ink-900)">${total}</text>
    <text x="${cx}" y="${cy + 16}" text-anchor="middle" font-size="11" fill="var(--ink-500)" letter-spacing="0.5">${opts.centerLabel || 'ทั้งหมด'}</text>
  </svg>`;
}

function svgBarVertical(items, opts = {}) {
  const w = opts.width || 560;
  const h = opts.height || 200;
  const padL = 32, padR = 8, padT = 18, padB = 28;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const max = Math.max(1, ...items.map(it => it.value));
  // Round max up to a nice number
  const niceMax = Math.ceil(max * 1.15);
  const gap = 0.32;
  const slot = innerW / items.length;
  const barW = slot * (1 - gap);
  // gridlines (4 levels)
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(t => {
    const y = padT + innerH * (1 - t);
    const val = Math.round(niceMax * t);
    return `<line class="grid-line" x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}"/><text class="axis-label" x="${padL - 6}" y="${y + 3}" text-anchor="end">${val}</text>`;
  }).join('');
  const bars = items.map((it, i) => {
    const x = padL + slot * i + (slot - barW) / 2;
    const bh = (it.value / niceMax) * innerH;
    const y = padT + innerH - bh;
    const color = it.color || CHART_COLORS.primary;
    return `
      <g>
        <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="${color}">
          <title>${it.label}: ${it.value}</title>
        </rect>
        ${bh > 18 ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--ink-700)">${it.value}</text>` : ''}
        <text class="axis-label" x="${x + barW/2}" y="${padT + innerH + 16}" text-anchor="middle">${it.label}</text>
      </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    ${gridLines}
    ${bars}
  </svg>`;
}

function svgBarHorizontal(items, opts = {}) {
  const itemH = opts.itemH || 28;
  const gap = 10;
  const padL = 130, padR = 40, padT = 6, padB = 6;
  const w = opts.width || 540;
  const h = padT + padB + items.length * (itemH + gap) - gap;
  const max = Math.max(1, ...items.map(it => it.value));
  const innerW = w - padL - padR;
  const rows = items.map((it, i) => {
    const y = padT + i * (itemH + gap);
    const bw = Math.max(2, (it.value / max) * innerW);
    const color = it.color || CHART_COLORS.primary;
    return `
      <g>
        <text x="${padL - 10}" y="${y + itemH/2 + 4}" text-anchor="end" font-size="12" fill="var(--ink-700)">${escapeHTML(it.label)}</text>
        <rect x="${padL}" y="${y}" width="${innerW}" height="${itemH}" rx="6" fill="var(--bg-elevated)"/>
        <rect x="${padL}" y="${y}" width="${bw}" height="${itemH}" rx="6" fill="${color}">
          <title>${it.label}: ${it.value}</title>
        </rect>
        <text x="${padL + innerW + 8}" y="${y + itemH/2 + 4}" font-size="12" font-weight="600" fill="var(--ink-900)">${it.value}</text>
      </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${rows}</svg>`;
}

// Stacked horizontal bar — each row is one entity, segments stack left-to-right
// rows: [{label, total, segments:[{value, color, name}]}]
function svgStackedHBar(rows, opts = {}) {
  const itemH = opts.itemH || 22;
  const gap = 8;
  const padL = 56, padR = 48, padT = 6, padB = 6;
  const w = opts.width || 540;
  const h = padT + padB + rows.length * (itemH + gap) - gap;
  const max = Math.max(1, ...rows.map(r => r.total || r.segments.reduce((a, b) => a + b.value, 0)));
  const innerW = w - padL - padR;
  const items = rows.map((r, i) => {
    const total = r.total != null ? r.total : r.segments.reduce((a, b) => a + b.value, 0);
    const trackW = innerW;
    const trackY = padT + i * (itemH + gap);
    // Background track
    let svg = `<rect x="${padL}" y="${trackY}" width="${trackW}" height="${itemH}" rx="6" fill="var(--bg-elevated)"/>`;
    // Stack segments based on TOTAL (not max) — fill the bar proportional to total/max
    let cursor = 0;
    const filledW = (total / max) * trackW;
    r.segments.forEach(s => {
      if (s.value <= 0 || total === 0) return;
      const segW = (s.value / total) * filledW;
      svg += `<rect x="${padL + cursor}" y="${trackY}" width="${segW}" height="${itemH}" fill="${s.color}"><title>${s.name}: ${s.value}</title></rect>`;
      cursor += segW;
    });
    // Round corners on the filled portion
    if (filledW > 0) {
      svg = svg.replace(/<rect x="([^"]+)" y="([^"]+)" width="([^"]+)" height="([^"]+)" fill="var\(--bg-elevated\)"\/>/, (m) => m);
    }
    // Label (left) and total (right)
    svg += `<text x="${padL - 10}" y="${trackY + itemH/2 + 4}" text-anchor="end" font-size="12" font-weight="600" fill="var(--ink-700)">${escapeHTML(r.label)}</text>`;
    svg += `<text x="${padL + trackW + 8}" y="${trackY + itemH/2 + 4}" font-size="12" font-weight="600" fill="var(--ink-900)">${total}</text>`;
    return svg;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="overflow:visible;">
    <defs>
      <clipPath id="rounded-${opts.id || 'sb'}">
        <rect x="0" y="0" width="${w}" height="${h}" rx="6"/>
      </clipPath>
    </defs>
    ${items}
  </svg>`;
}

function svgLineChart(items, opts = {}) {
  const w = opts.width || 720;
  const h = opts.height || 210;
  const padL = 32, padR = 14, padT = 18, padB = 28;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const max = Math.max(1, ...items.map(it => it.value));
  const niceMax = Math.ceil(max * 1.2);
  const stepX = items.length > 1 ? innerW / (items.length - 1) : 0;
  const points = items.map((it, i) => {
    const x = padL + stepX * i;
    const y = padT + innerH - (it.value / niceMax) * innerH;
    return [x, y, it];
  });
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(t => {
    const y = padT + innerH * (1 - t);
    const val = Math.round(niceMax * t);
    return `<line class="grid-line" x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}"/><text class="axis-label" x="${padL - 6}" y="${y + 3}" text-anchor="end">${val}</text>`;
  }).join('');
  const linePath = 'M ' + points.map(p => `${p[0]} ${p[1]}`).join(' L ');
  const areaPath = linePath + ` L ${points[points.length - 1][0]} ${padT + innerH} L ${points[0][0]} ${padT + innerH} Z`;
  const dots = points.map(([x, y, it]) => `
    <circle cx="${x}" cy="${y}" r="4" fill="white" stroke="${CHART_COLORS.primary}" stroke-width="2">
      <title>${it.label}: ${it.value}</title>
    </circle>
    ${it.value > 0 ? `<text x="${x}" y="${y - 10}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--ink-900)">${it.value}</text>` : ''}
  `).join('');
  const xLabels = points.map(([x, _, it]) => `<text class="axis-label" x="${x}" y="${padT + innerH + 16}" text-anchor="middle">${it.label}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${CHART_COLORS.primary}" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="${CHART_COLORS.primary}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#lineFill)"/>
    <path d="${linePath}" fill="none" stroke="${CHART_COLORS.primary}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

function donutLegend(segments) {
  const total = segments.reduce((a, b) => a + b.value, 0) || 1;
  return `<div class="donut-legend">
    ${segments.map(s => `
      <div class="donut-legend-item">
        <span class="dot" style="background:${s.color}"></span>
        <span class="lbl">${escapeHTML(s.label)}</span>
        <span class="val">${s.value}</span>
        <span class="pct">${Math.round((s.value / total) * 100)}%</span>
      </div>
    `).join('')}
  </div>`;
}

// Build last N months as [{label, key:'YYYY-MM'}]
function lastMonths(n) {
  const out = [];
  const d = new Date();
  d.setDate(1);
  for (let i = n - 1; i >= 0; i--) {
    const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
    const key = `${m.getFullYear()}-${String(m.getMonth() + 1).padStart(2, '0')}`;
    const thMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    out.push({ label: thMonths[m.getMonth()], key });
  }
  return out;
}

function ymOf(isoDate) {
  if (!isoDate) return '';
  const s = String(isoDate);
  // Expect YYYY-MM-DD or any leading prefix
  return s.length >= 7 ? s.slice(0, 7) : '';
}

function computeDashboard() {
  const P = State.patients;
  const V = State.visits;
  const total = P.length;
  const by = (s) => P.filter(p => p.status === s).length;
  const active = by('active');
  const cured = by('cured');
  const complete = by('treatmentComplete');
  const lost = by('lost');
  const transferred = by('transferred');
  const deceased = by('deceased');
  const diagChange = by('diagnosisChange');

  // Closed cases (for outcome rate calc) — exclude active
  const closedCases = total - active;
  const cureRate = closedCases > 0 ? Math.round(((cured + complete) / closedCases) * 100) : 0;
  const lossRate = closedCases > 0 ? Math.round((lost / closedCases) * 100) : 0;

  // Patients needing attention (active + no recent visit > 14d, or last visit had missed doses)
  const attention = [];
  P.forEach(p => {
    if (p.status !== 'active') return;
    const myVisits = V.filter(v => v.patientId === p.id).sort((a, b) => b.date.localeCompare(a.date));
    if (myVisits.length === 0) {
      attention.push({ p, reason: 'ยังไม่เคยเยี่ยม', urgent: true });
      return;
    }
    const lastVisit = myVisits[0];
    const days = daysSince(lastVisit.date);
    if (days > 30) {
      attention.push({ p, reason: `ไม่ได้เยี่ยม ${days} วัน`, urgent: true });
    } else if (days > 14) {
      attention.push({ p, reason: `ไม่ได้เยี่ยม ${days} วัน`, urgent: false });
    } else if (lastVisit.medicationTaken === false) {
      attention.push({ p, reason: `ขาดยา${lastVisit.missedDoses ? ' ' + lastVisit.missedDoses + ' มื้อ' : ''}`, urgent: true });
    }
  });
  attention.sort((a, b) => Number(b.urgent) - Number(a.urgent));

  // Patient type breakdown
  const typeCount = {};
  PATIENT_TYPES.forEach(t => typeCount[t] = 0);
  P.forEach(p => { if (p.patientType) typeCount[p.patientType] = (typeCount[p.patientType] || 0) + 1; });

  // TB class breakdown
  const tbClassCount = { 'วัณโรคในปอด': 0, 'วัณโรคนอกปอด': 0, 'ไม่ระบุ': 0 };
  P.forEach(p => {
    if (p.tbClass === 'วัณโรคในปอด') tbClassCount['วัณโรคในปอด']++;
    else if (p.tbClass === 'วัณโรคนอกปอด') tbClassCount['วัณโรคนอกปอด']++;
    else tbClassCount['ไม่ระบุ']++;
  });

  // Area type
  const areaCount = { 'ในเขต': 0, 'นอกเขต': 0, 'ไม่ระบุ': 0 };
  P.forEach(p => {
    if (p.areaType === 'ในเขต') areaCount['ในเขต']++;
    else if (p.areaType === 'นอกเขต') areaCount['นอกเขต']++;
    else areaCount['ไม่ระบุ']++;
  });

  // Monthly new patients (by treatmentStartDate, 6 months)
  const months = lastMonths(6);
  const newPerMonth = months.map(m => ({
    label: m.label,
    value: P.filter(p => ymOf(p.treatmentStartDate) === m.key).length
  }));
  // Visits per month (6 months)
  const visitsPerMonth = months.map(m => ({
    label: m.label,
    value: V.filter(v => ymOf(v.date) === m.key).length
  }));

  // Test result breakdown (only non-empty)
  const testCount = {};
  TEST_RESULTS.forEach(t => testCount[t] = 0);
  P.forEach(p => {
    const t = p.testResult || p.afbResult;
    if (t) testCount[t] = (testCount[t] || 0) + 1;
  });

  // Adherence (กินยา/ขาดยา) from all visits
  let dosesTaken = 0, dosesMissed = 0;
  V.forEach(v => {
    if (v.medicationTaken === true) dosesTaken++;
    else if (v.medicationTaken === false) dosesMissed++;
  });
  const adherenceRate = (dosesTaken + dosesMissed) > 0 ? Math.round((dosesTaken / (dosesTaken + dosesMissed)) * 100) : 0;

  // Total visits, total household contacts
  const totalVisits = V.length;
  const totalContacts = P.reduce((sum, p) => sum + (Array.isArray(p.householdContacts) ? p.householdContacts.length : 0), 0);
  // Avg visits per active patient
  const visitsForActive = active > 0
    ? Math.round((V.filter(v => P.find(p => p.id === v.patientId && p.status === 'active')).length / active) * 10) / 10
    : 0;

  // Per-zone breakdown (201-209)
  const attentionByPatientId = new Set(attention.map(a => a.p.id));
  const zoneStats = ZONES.map(z => {
    const zp = P.filter(p => p.zone === z);
    const zpIds = new Set(zp.map(p => p.id));
    const zv = V.filter(v => zpIds.has(v.patientId));
    const zActive   = zp.filter(p => p.status === 'active').length;
    const zCured    = zp.filter(p => p.status === 'cured').length;
    const zComplete = zp.filter(p => p.status === 'treatmentComplete').length;
    const zLost     = zp.filter(p => p.status === 'lost').length;
    const zTrans    = zp.filter(p => p.status === 'transferred').length;
    const zDec      = zp.filter(p => p.status === 'deceased').length;
    const zDiag     = zp.filter(p => p.status === 'diagnosisChange').length;
    const zTotal    = zp.length;
    const zClosed   = zTotal - zActive;
    const zCureRate = zClosed > 0 ? Math.round(((zCured + zComplete) / zClosed) * 100) : null;
    const zAttention = zp.filter(p => attentionByPatientId.has(p.id)).length;
    return {
      zone: z, total: zTotal,
      active: zActive, cured: zCured, complete: zComplete,
      lost: zLost, transferred: zTrans, deceased: zDec, diagChange: zDiag,
      closed: zClosed, cureRate: zCureRate,
      visits: zv.length, attention: zAttention
    };
  });

  return {
    total, active, cured, complete, lost, transferred, deceased, diagChange,
    closedCases, cureRate, lossRate,
    attention, typeCount, tbClassCount, areaCount,
    newPerMonth, visitsPerMonth, testCount,
    totalVisits, dosesTaken, dosesMissed, adherenceRate,
    totalContacts, visitsForActive,
    zoneStats
  };
}

/* ════════════════════════════════════════════════════════════════
   THEME (Light / Dark Mode)
   ═══════════════════════════════════════════════════════════════ */
const THEME_KEY = 'tb_theme';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  // Refresh chart palette from CSS variables
  updateChartColors();
  // Re-render dashboard so charts pick up new colors
  if (State.view === 'dashboard') render();
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
  applyTheme(next);
}

function updateChartColors() {
  const cs = getComputedStyle(document.documentElement);
  const pick = (name, fallback) => (cs.getPropertyValue(name) || fallback).trim() || fallback;
  CHART_COLORS.primary     = pick('--chart-primary',      '#2d4f3f');
  CHART_COLORS.primaryLite = pick('--chart-primary-lite', '#5a8073');
  CHART_COLORS.success     = pick('--chart-success',      '#4a7a5a');
  CHART_COLORS.warning     = pick('--chart-warning',      '#c89832');
  CHART_COLORS.danger      = pick('--chart-danger',       '#b3463e');
  CHART_COLORS.accent      = pick('--chart-accent',       '#c97560');
  CHART_COLORS.neutral     = pick('--chart-neutral',      '#a8b1ab');
  CHART_COLORS.blue        = pick('--chart-blue',         '#4a6f8a');
}

// Auto-react to system theme changes (only if user hasn't manually picked)
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    try {
      if (localStorage.getItem(THEME_KEY)) return; // user has a manual preference
    } catch (err) {}
    applyTheme(e.matches ? 'dark' : 'light');
  });
}

/* Move action items between .header-actions (cover/detail) and .subnav-actions (list/dashboard) */
function relocateHeaderActions(view) {
  const headerActions = document.querySelector('.app-header .header-actions');
  const subnavActions = document.getElementById('subnavActions');
  if (!headerActions || !subnavActions) return;
  const items = [
    document.getElementById('syncIndicator'),
    document.getElementById('themeToggle'),
    document.getElementById('settingsBtn')
  ].filter(Boolean);
  const goesToSubnav = (view === 'list' || view === 'dashboard');
  const target = goesToSubnav ? subnavActions : headerActions;
  items.forEach(el => {
    if (el.parentNode !== target) target.appendChild(el);
  });
}

/* Move brand pill between header (cover/detail) and subnav (list/dashboard) */
function relocateHeaderBrand(view) {
  const brand = document.querySelector('.brand');
  const headerInner = document.querySelector('.header-inner');
  const subnavSlot = document.getElementById('subnavBrandSlot');
  if (!brand || !headerInner || !subnavSlot) return;
  const goesToSubnav = (view === 'list' || view === 'dashboard');
  brand.classList.toggle('brand-in-subnav', goesToSubnav);
  if (goesToSubnav) {
    if (brand.parentNode !== subnavSlot) subnavSlot.appendChild(brand);
  } else {
    if (brand.parentNode !== headerInner) headerInner.insertBefore(brand, headerInner.firstChild);
  }
}

function renderMedicationTab(p, visits) {
  if (!p.treatmentStartDate) {
    return `
      <div class="empty-state" style="padding: 60px 20px;">
        <div class="empty-state-icon">${ICON.pill}</div>
        <h3>ยังไม่มีข้อมูลการรักษา</h3>
        <p>กรุณาระบุวันที่เริ่มรักษาในข้อมูลผู้ป่วย</p>
        <button class="btn btn-primary" onclick="openPatientModal('${p.id}')">${ICON.edit} แก้ไขข้อมูล</button>
      </div>`;
  }
  const medStatus = {};
  visits.forEach(v => {
    if (v.medicationTaken === true) medStatus[v.date] = 'taken';
    else if (v.medicationTaken === false) medStatus[v.date] = 'missed';
  });
  const startDate = new Date(p.treatmentStartDate);
  const months = p.regimenMonths || 6;
  const totalDays = months * 30;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  startDate.setHours(0, 0, 0, 0);
  let takenCount = 0, missedCount = 0, recordedDays = 0;
  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const status = medStatus[iso];
    const isFuture = d > today;
    const isToday = d.getTime() === today.getTime();
    days.push({ iso, day: d.getDate(), status, isFuture, isToday });
    if (status === 'taken') takenCount++;
    if (status === 'missed') missedCount++;
    if (status) recordedDays++;
  }
  const adherence = recordedDays > 0 ? Math.round((takenCount / recordedDays) * 100) : 0;
  const daysSinceStart = Math.max(0, daysBetween(p.treatmentStartDate, todayISO()));

  return `
    <div class="section-title"><h3>การกินยา (DOT) <span class="num">${months} เดือน</span></h3></div>
    <div class="stats" style="margin-bottom: 18px;">
      <div class="stat-card" style="--c: var(--success)"><div class="stat-label">กินยา</div><div class="stat-value">${takenCount}<span class="unit">มื้อ</span></div></div>
      <div class="stat-card" style="--c: var(--danger)"><div class="stat-label">ขาดยา</div><div class="stat-value">${missedCount}<span class="unit">มื้อ</span></div></div>
      <div class="stat-card" style="--c: var(--primary)"><div class="stat-label">รักษามาแล้ว</div><div class="stat-value">${daysSinceStart}<span class="unit">วัน</span></div></div>
      <div class="stat-card" style="--c: var(--accent)"><div class="stat-label">Adherence</div><div class="stat-value">${adherence}<span class="unit">%</span></div></div>
    </div>
    <div style="background: var(--bg-elevated); padding: 18px; border-radius: 12px; border: 1px solid var(--border);">
      <div style="font-size: 13px; color: var(--ink-500); margin-bottom: 12px;">
        ตารางบันทึก ${months} เดือน · เริ่ม ${fmtDate(p.treatmentStartDate)} (กดที่ช่องเพื่อบันทึก)
      </div>
      <div class="dot-grid">
        ${days.map(d => `<div class="dot-day ${d.status || ''} ${d.isToday ? 'today' : ''} ${d.isFuture ? 'future' : ''}" onclick="${d.isFuture ? '' : `toggleDotDay('${d.iso}')`}" title="${fmtDate(d.iso)}${d.status ? ' · ' + (d.status === 'taken' ? 'กินยา' : 'ขาดยา') : ''}">${d.day}</div>`).join('')}
      </div>
      <div class="dot-legend">
        <span class="legend-item"><span class="legend-dot" style="background: var(--success)"></span>กินยา</span>

      </div>

}

function renderSymptomsTab(p, visits) {
  const events = [];
  visits.forEach(v => {
    const syms = Object.entries(v.symptoms || {}).filter(([_, val]) => val).map(([k]) => SYMPTOM_LABELS[k]).filter(Boolean);
    if (syms.length > 0 || v.sideEffects) {
      events.push({
        date: v.date, symptoms: syms, sideEffects: v.sideEffects,
        warn: syms.includes('ไอเป็นเลือด') || syms.includes('เจ็บหน้าอก')
      });
    }
  });
  events.sort((a, b) => b.date.localeCompare(a.date));
  const freq = {};
  visits.forEach(v => {
    Object.entries(v.symptoms || {}).forEach(([k, val]) => {
      if (val) freq[k] = (freq[k] || 0) + 1;
    });
  });
  const freqSorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);

  return `
    <div class="section-title"><h3>สรุปอาการที่พบ</h3></div>
    ${freqSorted.length === 0 ? `
      <div style="padding: 24px; background: var(--success-soft); border-radius: 10px; color: var(--success); display: flex; align-items: center; gap: 10px;">✓ ไม่พบอาการผิดปกติจากการเยี่ยมบ้าน</div>
    ` : `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px;">
        ${freqSorted.map(([k, count]) => `<div style="background: var(--bg-elevated); padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;"><span style="font-size: 14px;">${SYMPTOM_LABELS[k] || k}</span><span style="font-family: var(--font-mono); font-weight: 600; color: var(--accent);">${count}×</span></div>`).join('')}
      </div>
    `}
    <div class="section-title" style="margin-top: 28px;"><h3>Timeline อาการ</h3></div>
    ${events.length === 0 ? `<div class="text-muted" style="padding: 30px; text-align: center;">— ยังไม่มีบันทึกอาการ —</div>` : `
      <div class="timeline">
        ${events.map(e => `
          <div class="timeline-item ${e.warn ? 'warn' : ''}">
            <div class="timeline-date">${fmtDate(e.date)}</div>
            <div class="timeline-content">
              ${e.symptoms.length > 0 ? `<div class="symptom-chips" style="margin-top: 4px;">${e.symptoms.map(s => `<span class="pill pill-warn">${escapeHTML(s)}</span>`).join('')}</div>` : ''}
              ${e.sideEffects ? `<div style="margin-top: 6px; font-size: 13px; color: var(--ink-700);"><em>ผลข้างเคียง:</em> ${escapeHTML(e.sideEffects)}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    `}`;
}

let householdContacts = [];

function renderHouseholdList() {
  const list = document.getElementById('householdList');
  const count = document.getElementById('hcCount');
  if (count) count.textContent = householdContacts.length;
  if (!list) return;
  if (householdContacts.length === 0) {
    list.innerHTML = '<div class="contact-empty">ยังไม่มีผู้สัมผัสร่วมบ้าน — กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
    return;
  }
  list.innerHTML = householdContacts.map((c, i) => `
    <div class="contact-card">
      <div class="contact-card-head">
        <span>ผู้สัมผัสคนที่ ${i + 1}</span>
        <button type="button" class="contact-remove" onclick="removeHouseholdContact(${i})" title="ลบ">✕</button>
      </div>
      <div class="zone-stack">
        <div class="zone-block">
          <div class="zone-block-head">
            <span class="zone-tag zone-rphs">รพ.สต.</span>
            <span class="zone-hint">ข้อมูลพื้นฐาน — กรอกโดยเจ้าหน้าที่ รพ.สต.</span>
          </div>
          <div class="form-row">
            <div class="form-group"><label>ชื่อ-นามสกุล</label><input class="input" oninput="updateHC(${i},'name',this.value)" value="${escapeHTML(c.name || '')}" placeholder="ชื่อ - สกุล"></div>
            <div class="form-group"><label>อายุ</label><input class="input" type="number" oninput="updateHC(${i},'age',this.value)" value="${escapeHTML(c.age || '')}" placeholder="—"></div>
          </div>
        </div>
        <div class="zone-block zone-block-hospital">
          <div class="zone-block-head">
            <span class="zone-tag zone-hospital">โรงพยาบาล</span>
            <span class="zone-hint">ผลตรวจ — กรอกโดยเจ้าหน้าที่โรงพยาบาล</span>
          </div>
          <div class="form-row">
            <div class="form-group"><label>วันที่ CXR</label><input class="input" type="date" onchange="updateHC(${i},'cxrDate',this.value)" value="${escapeHTML(c.cxrDate || '')}"></div>
            <div class="form-group"><label>วันที่ตรวจ IGRAs</label><input class="input" type="date" onchange="updateHC(${i},'igraDate',this.value)" value="${escapeHTML(c.igraDate || '')}"></div>
            <div class="form-group"><label>ผล IGRAs</label>
              <select class="select" onchange="updateHC(${i},'igraResult',this.value)">

              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function addHouseholdContact() {
  householdContacts.push({ name: '', age: '', cxrDate: '', igraDate: '', igraResult: '' });
  renderHouseholdList();
}

function removeHouseholdContact(i) {
  householdContacts.splice(i, 1);
  renderHouseholdList();
}

function updateHC(i, field, value) {
  if (householdContacts[i]) householdContacts[i][field] = value;
}

function toggleTransferTo() {
  const status = document.getElementById('f-status');
  const row = document.getElementById('transferToRow');
  if (status && row) row.style.display = (status.value === 'transferred') ? 'grid' : 'none';
}

function toggleTbClassDetail() {
  const checked = document.querySelector('input[name="f-tbClass"]:checked');
  const row = document.getElementById('tbClassDetailRow');
  if (!row) return;
  const isExtra = checked && checked.value === 'วัณโรคนอกปอด';
  row.style.display = isExtra ? 'grid' : 'none';
  if (!isExtra) {
    const detail = document.getElementById('f-tbClassDetail');
    if (detail) detail.value = '';
  }
}

async function savePatient(id) {
  const get = (k) => document.getElementById('f-' + k).value.trim();

  // Clear previous errors
  document.querySelectorAll('.modal-body .form-group.has-error').forEach(el => el.classList.remove('has-error'));
  const alertBox = document.getElementById('patientFormAlert');
  if (alertBox) alertBox.classList.remove('show');

  // Validate required fields
  const tbClassChecked = (document.querySelector('input[name="f-tbClass"]:checked') || {}).value;
  const areaTypeChecked = (document.querySelector('input[name="f-areaType"]:checked') || {}).value;
  const required = [
    { field: 'name',                value: get('name'),                label: 'ชื่อ-นามสกุล' },
    { field: 'hn',                  value: get('hn'),                  label: 'HN' },
    { field: 'age',                 value: get('age'),                 label: 'อายุ' },
    { field: 'gender',              value: get('gender'),              label: 'เพศ' },
    { field: 'addrNo',              value: get('addrNo'),              label: 'บ้านเลขที่' },
    { field: 'addrMoo',             value: get('addrMoo'),             label: 'หมู่' },
    { field: 'addrTambon',          value: get('addrTambon'),          label: 'ตำบล' },
    { field: 'addrAmphoe',          value: get('addrAmphoe'),          label: 'อำเภอ' },
    { field: 'addrProvince',        value: get('addrProvince'),        label: 'จังหวัด' },
    { field: 'zone',                value: get('zone'),                label: 'เขตพื้นที่' },
    { field: 'areaType',            value: areaTypeChecked,            label: 'สถานะพื้นที่' },
    { field: 'treatmentStartDate',  value: get('treatmentStartDate'),  label: 'วันที่เริ่มรักษา' },
    { field: 'tbClass',             value: tbClassChecked,             label: 'จำแนกผู้ป่วย' },
    { field: 'testResult',          value: get('testResult'),          label: 'ผลตรวจ' },
    { field: 'patientType',         value: get('patientType'),         label: 'ประเภทผู้ป่วย' }
  ];
  // Conditional: tbClassDetail required when tbClass = "วัณโรคนอกปอด"
  if (tbClassChecked === 'วัณโรคนอกปอด') {
    required.push({ field: 'tbClassDetail', value: get('tbClassDetail'), label: 'ระบุตำแหน่ง/ชนิด' });
  }
  const missing = required.filter(r => !r.value);
  if (missing.length > 0) {
    missing.forEach(m => {
      const el = document.querySelector(`.form-group[data-field="${m.field}"]`);
      if (el) el.classList.add('has-error');
    });
    if (alertBox) alertBox.classList.add('show');
    toast(`กรุณากรอกข้อมูลที่บังคับให้ครบ (${missing.length} ช่อง)`, 'error', 3500);
    // Scroll to first missing field
    const firstEl = document.querySelector('.form-group.has-error');
    if (firstEl) firstEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const name = get('name');

  const status = get('status') || 'active';
  const cleanedContacts = householdContacts
    .map(c => ({
      name: (c.name || '').trim(),
      age: (c.age || '').toString().trim(),
      cxrDate: (c.cxrDate || '').trim(),
      igraDate: (c.igraDate || '').trim(),
      igraResult: (c.igraResult || '').trim()
    }))
    .filter(c => c.name || c.age || c.cxrDate || c.igraDate || c.igraResult);

  const data = {
    name, hn: get('hn'), age: get('age'), gender: get('gender'), phone: get('phone'),
    addrNo: get('addrNo'), addrMoo: get('addrMoo'), addrTambon: get('addrTambon'),
    addrAmphoe: get('addrAmphoe'), addrProvince: get('addrProvince'),
    zone: get('zone'),
    areaType: (document.querySelector('input[name="f-areaType"]:checked') || {}).value || '',
    contactPerson: get('contact'),
    treatmentStartDate: get('treatmentStartDate'),
    regimen: get('regimen'), regimenMonths: parseInt(get('regimenMonths')) || 6,
    testResult: get('testResult'), patientType: get('patientType'),
    tbClass: (document.querySelector('input[name="f-tbClass"]:checked') || {}).value || '',
    tbClassDetail: '',
    status, transferTo: status === 'transferred' ? get('transferTo') : '',
    householdContacts: cleanedContacts,
    notes: get('notes')
  };
  // Only keep tbClassDetail when classification is "นอกปอด"
  if (data.tbClass === 'วัณโรคนอกปอด') {
    data.tbClassDetail = get('tbClassDetail');
  }
  // Build combined address string for backward compatibility (legacy 'address' column)
  data.address = fullAddress(data);
  // Keep legacy 'afbResult' in sync with new testResult (backward compat for old rows/columns)
  data.afbResult = data.testResult;

  const btn = document.getElementById('savePatientBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  try {
    if (State.demo) {
      if (id) {
        const idx = State.patients.findIndex(p => p.id === id);
        if (idx >= 0) State.patients[idx] = normalizePatient({ ...State.patients[idx], ...data, id, updatedAt: todayISO() });
        toast('บันทึกการแก้ไข (Demo)', 'success');
      } else {
        const created = normalizePatient({ ...data, id: 'demo-' + Date.now(), createdBy: 'Demo', updatedAt: todayISO() });
        State.patients.unshift(created);
        State.currentPatientId = created.id;
        State.view = 'detail';
        State.currentTab = 'info';
        toast('เพิ่มผู้ป่วย (Demo)', 'success');
      }
    } else if (id) {
      const updated = await API.updatePatient(id, data);
      const idx = State.patients.findIndex(p => p.id === id);
      if (idx >= 0) State.patients[idx] = normalizePatient(updated);
      toast('บันทึกการแก้ไขแล้ว', 'success');
    } else {
      const created = await API.addPatient(data);
      State.patients.unshift(normalizePatient(created));
      State.currentPatientId = created.id;
      State.view = 'detail';
      State.currentTab = 'info';
      toast('เพิ่มผู้ป่วยเรียบร้อย', 'success');
    }
    closeModal();
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 4000);
    btn.disabled = false;
    btn.textContent = id ? 'บันทึกการแก้ไข' : 'เพิ่มผู้ป่วย';
  }
}

function toggleWarningSign(key) {

}

function setMedStatus(s) {
  document.getElementById('v-med-taken').classList.toggle('active', s === true);
  document.getElementById('v-med-missed').classList.toggle('active', s === false);
  document.getElementById('v-med-none').classList.toggle('active', s === null);

}

function toggleSymptom(key) {

}

async function handlePhotoUpload(e) {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  toast(`กำลังเตรียม ${files.length} รูป...`);
  for (const f of files) {
    try {
      const compressed = await compressImage(f, 1000, 0.75);
      visitPhotos.push({ base64: compressed, name: f.name, isNew: true });
    } catch (err) { console.error(err); }
  }
  refreshPhotoPreview();
  e.target.value = '';
}

function refreshPhotoPreview() {
  const grid = document.getElementById('v-photo-preview');
  if (!grid) return;
  grid.innerHTML = visitPhotos.map((p, i) => {
    const src = p.url || p.base64;
    return `<div class="photo-preview" style="background-image: url('${src}')"><button type="button" class="photo-remove" onclick="removePhoto(${i})" title="ลบ">${ICON.close}</button></div>`;
  }).join('');
}

function removePhoto(i) { visitPhotos.splice(i, 1); refreshPhotoPreview(); }

async function saveVisit(id) {
  const get = (k) => document.getElementById('v-' + k).value.trim();

  // Clear previous errors
  document.querySelectorAll('.modal-body .form-group.has-error').forEach(el => el.classList.remove('has-error'));
  const alertBox = document.getElementById('visitFormAlert');
  if (alertBox) alertBox.classList.remove('show');

  // Validate required fields
  const required = [
    { field: 'date',         value: get('date'),         label: 'วันที่เยี่ยม' },
    { field: 'visitorName',  value: get('visitorName'),  label: 'ผู้เยี่ยม' }
  ];
  const missing = required.filter(r => !r.value);
  if (missing.length > 0) {
    missing.forEach(m => {
      const el = document.querySelector(`.form-group[data-field="${m.field}"]`);
      if (el) el.classList.add('has-error');
    });
    if (alertBox) alertBox.classList.add('show');
    toast(`กรุณากรอกข้อมูลที่บังคับให้ครบ (${missing.length} ช่อง)`, 'error', 3500);
    const firstEl = document.querySelector('.form-group.has-error');
    if (firstEl) firstEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const date = get('date');

  const generalSymptoms = {};
  document.querySelectorAll('#v-generalSymptoms .check-item').forEach(el => {
    if (el.classList.contains('checked')) generalSymptoms[el.dataset.gsym] = true;
  });
  const warningSigns = {};
  document.querySelectorAll('#v-warningSigns .check-item').forEach(el => {
    if (el.classList.contains('checked')) warningSigns[el.dataset.warn] = true;
  });

  let medicationTaken = null;
  if (document.getElementById('v-med-taken').classList.contains('active')) medicationTaken = true;
  else if (document.getElementById('v-med-missed').classList.contains('active')) medicationTaken = false;

  const btn = document.getElementById('saveVisitBtn');
  btn.disabled = true;

  // Step 1: Upload new photos
  const newPhotos = visitPhotos.filter(p => p.isNew && p.base64);
  const existingPhotos = visitPhotos.filter(p => !p.isNew);
  const uploadedPhotos = [];

  if (newPhotos.length > 0) {
    btn.textContent = `อัพโหลดรูป 1/${newPhotos.length}...`;
    for (let i = 0; i < newPhotos.length; i++) {
      btn.textContent = `อัพโหลดรูป ${i + 1}/${newPhotos.length}...`;
      try {
        const result = await API.uploadPhoto(newPhotos[i].name, newPhotos[i].base64, State.currentPatientId);
        uploadedPhotos.push({ fileId: result.fileId, url: result.url, name: result.name });
      } catch (err) {
        toast(`อัพโหลดรูปที่ ${i + 1} ไม่สำเร็จ: ${err.message}`, 'error', 4000);
        btn.disabled = false;
        btn.textContent = id ? 'บันทึกการแก้ไข' : 'บันทึกการเยี่ยม';
        return;
      }
    }
  }

  btn.textContent = 'บันทึก...';
  const allPhotos = [...existingPhotos, ...uploadedPhotos];

  const data = {
    patientId: State.currentPatientId,
    date,
    visitTime: get('visitTime'),
    visitorName: get('visitorName'),
    visitorRole: get('visitorRole'),
    asmName: get('asmName'),
    medicationTaken,
    missedDoses: parseInt(get('missedDoses')) || 0,
    generalSymptoms,
    generalSymptomsOther: get('generalSymptomsOther'),
    warningSigns,
    weight: get('weight'),
    bloodPressure: get('bloodPressure'),
    pulse: get('pulse'),
    respiration: get('respiration'),
    temperature: get('temperature'),
    spo2: get('spo2'),
    notes: get('notes'),
    photos: allPhotos
  };

  try {
    if (State.demo) {
      const created = normalizeVisit({ ...data, id: 'demo-v-' + Date.now() });
      State.visits.unshift(created);
      toast('บันทึกการเยี่ยม (Demo)', 'success');
    } else {
      const created = await API.addVisit(data);
      State.visits.unshift(normalizeVisit(created));
      toast('บันทึกการเยี่ยมบ้านเรียบร้อย', 'success');
    }
    visitPhotos = [];
    closeModal();
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 4000);
    btn.disabled = false;
    btn.textContent = id ? 'บันทึกการแก้ไข' : 'บันทึกการเยี่ยม';
  }
}

async function deletePatient(id) {
  const p = State.patients.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`ลบ "${p.name}" และข้อมูลการเยี่ยมบ้านทั้งหมด?\nไม่สามารถย้อนกลับได้`)) return;
  showLoading('กำลังลบ...');
  try {
    await API.deletePatient(id);
    State.patients = State.patients.filter(x => x.id !== id);
    State.visits = State.visits.filter(v => v.patientId !== id);
    State.view = 'list';
    toast('ลบผู้ป่วยเรียบร้อย', 'success');
    render();
  } catch (err) {
    toast('ลบไม่สำเร็จ: ' + err.message, 'error', 4000);
  } finally { hideLoading(); }
}

async function deleteVisit(id) {
  if (!confirm('ลบบันทึกการเยี่ยมบ้านนี้?')) return;
  showLoading('กำลังลบ...');

    await API.deleteVisit(id);
    State.visits = State.visits.filter(v => v.id !== id);
    toast('ลบแล้ว', 'success');
    render();
  } catch (err) {
    toast('ลบไม่สำเร็จ: ' + err.message, 'error', 4000);
  } finally { hideLoading(); }
}

// Quick DOT toggle — saves as a minimal visit record
async function toggleDotDay(iso) {
  const existing = State.visits.find(v => v.patientId === State.currentPatientId && v.date === iso);
  showLoading('บันทึก...');
  try {
    if (existing) {
      // Cycle: taken → missed → no record (delete)
      if (existing.medicationTaken === true) {
        // Need to update — for simplicity, delete and re-add as missed
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
        const created = await API.addVisit({
          patientId: State.currentPatientId, date: iso, medicationTaken: false,
          symptoms: {}, photos: [], visitorName: '(quick entry)'
        });
        State.visits.push(normalizeVisit(created));
      } else if (existing.medicationTaken === false) {
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
      } else {
        // null → taken
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
        const created = await API.addVisit({
          patientId: State.currentPatientId, date: iso, medicationTaken: true,
          symptoms: {}, photos: [], visitorName: '(quick entry)'
        });
        State.visits.push(normalizeVisit(created));
      }
    } else {
      const created = await API.addVisit({
        patientId: State.currentPatientId, date: iso, medicationTaken: true,
        symptoms: {}, photos: [], visitorName: '(quick entry)'
      });
      State.visits.push(normalizeVisit(created));
    }
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 3000);
  } finally { hideLoading(); }
}

function viewImage(visitId, idx) {
  const v = State.visits.find(x => x.id === visitId);
  if (!v || !v.photos || !v.photos[idx]) return;
  const src = v.photos[idx].url || v.photos[idx];
  document.getElementById('viewerRoot').innerHTML = `
    <div class="image-viewer" onclick="closeViewer()">
      <button class="image-viewer-close">${ICON.close}</button>
      <img src="${src}" alt="">
    </div>`;
}
function closeViewer() { document.getElementById('viewerRoot').innerHTML = ''; }

          <strong>หากเชื่อมต่อไม่ได้:</strong><br>
          1. ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต<br>
          2. รีเฟรชหน้านี้ (กด <code>F5</code> หรือดึงลงเพื่อรีเฟรช)<br>
          3. หากยังไม่ได้ ติดต่อผู้ดูแลระบบ
        </div>
      </div>
    </div>`;
}

async function connectAndLoad() {
  const btn = document.getElementById('setupBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'กำลังเชื่อมต่อ...';
  }

  try {
    const result = await API.ping();
    State.user = result.user;
    toast('เชื่อมต่อสำเร็จ', 'success');
    await loadAll();
    State.view = 'list';
    render();
  } catch (err) {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'ลองเชื่อมต่ออีกครั้ง';
    }
    renderSetup(err.message);
  }
}

function openSettings() {
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width: 480px;">
        <div class="modal-header">
          <div><div class="modal-title">การตั้งค่า<small>${State.user ? 'login เป็น ' + escapeHTML(State.user) : ''}</small></div></div>
          <button class="modal-close" onclick="closeModal()">${ICON.close}</button>
        </div>
        <div class="modal-body">
          <div style="padding: 14px; background: var(--bg-elevated); border-radius: 8px; font-size: 13px; color: var(--ink-700); line-height: 1.6;">
            <strong>ข้อมูลระบบ:</strong><br>
            ผู้ป่วยทั้งหมด: ${State.patients.length} ราย<br>
            บันทึกการเยี่ยม: ${State.visits.length} ครั้ง<br>
            ${State.lastSync ? 'Sync ล่าสุด: ' + fmtDate(State.lastSync) + ' ' + State.lastSync.toLocaleTimeString('th-TH') : ''}
          </div>
        </div>
        <div class="modal-footer" style="justify-content: flex-end;">
          <button class="btn btn-secondary" onclick="refreshData(); closeModal();">รีเฟรชข้อมูล</button>
          <button class="btn btn-primary" onclick="closeModal()">ปิด</button>
        </div>
      </div>
    </div>`;
}

async function saveSettings() {
  // URL is locked — settings modal no longer edits URL
  closeModal();
}

function disconnect() {
  if (!confirm('ตัดการเชื่อมต่อ? ข้อมูลใน Google Sheet จะไม่ถูกลบ — แค่ลบ URL ที่บันทึกไว้ในเบราว์เซอร์นี้')) return;
  API.setUrl('');
  State.patients = [];
  State.visits = [];
  State.user = null;
  closeModal();
  document.getElementById('syncIndicator').style.display = 'none';
  document.getElementById('settingsBtn').style.display = 'none';
  renderSetup();
}

/* ════════════════════════════════════════════════════════════════
   DATA LOADING
   ═══════════════════════════════════════════════════════════════ */
async function loadAll(silent = false) {
  if (State.syncing) return;
  State.syncing = true;
  setSyncState('syncing', 'กำลัง sync...');
  // Use skeleton on list/dashboard for modern perceived-perf; overlay for other views
  let usingSkeleton = false;
  if (!silent) {
    if (State.view === 'list') { showSkeletonList(); usingSkeleton = true; }
    else if (State.view === 'dashboard') { showSkeletonDashboard(); usingSkeleton = true; }
    else { showLoading('กำลังโหลดข้อมูล...'); }
  }
  try {
    const [patients, visits] = await Promise.all([API.listPatients(), API.listVisits()]);
    State.patients = (patients || []).map(normalizePatient);
    State.visits = (visits || []).map(normalizeVisit);
    State.lastSync = new Date();
    setSyncState('ok', `Sync ${State.lastSync.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`);
  } catch (err) {
    setSyncState('error', 'Sync ล้มเหลว');
    if (!silent) toast('ดึงข้อมูลไม่สำเร็จ: ' + err.message, 'error', 4000);
  } finally {
    State.syncing = false;
    if (!silent && !usingSkeleton) hideLoading();
    // If skeleton was shown, re-render to replace it with actual content
    if (usingSkeleton) render();
  }
}

async function refreshData() {
  await loadAll();
  render();
  toast('รีเฟรชข้อมูลแล้ว', 'success', 1800);
}

/* ════════════════════════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════════════════════ */
function render() {
  if (!API.url && !State.demo) { renderSetup(); return; }
  document.getElementById('settingsBtn').style.display = State.demo ? 'none' : 'grid';
  // Set body data-view for view-specific styling (e.g. list bg image)
  document.body.dataset.view = State.view;
  // Show subnav only on list/dashboard views (hide on cover/detail)
  const subnav = document.getElementById('subnav');
  const navTabs = document.getElementById('navTabs');
  const showNav = State.view !== 'detail' && State.view !== 'cover';
  if (subnav) subnav.style.display = showNav ? 'block' : 'none';
  if (navTabs) {
    navTabs.querySelectorAll('.nav-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === State.view);
    });
  }
  // Move brand + action items between header (cover/detail) and subnav (list/dashboard)
  relocateHeaderBrand(State.view);
  relocateHeaderActions(State.view);
  if (State.view === 'cover') renderCover();
  else if (State.view === 'detail' && State.currentPatientId) renderDetail();
  else if (State.view === 'dashboard') renderDashboard();
  else renderList();
  // Trigger count-up animation on any KPI numbers in the new view
  requestAnimationFrame(() => animateAllCounts());
}

/* ════════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
(async function init() {
  // Initialize chart palette from current theme's CSS variables
  updateChartColors();

  // Demo mode: ?demo=1 — preview the UI without backend (read-only, in-memory data)
  const isDemo = /[?&]demo=1\b/.test(location.search);
  if (isDemo) {
    State.demo = true;
    State.patients = DEMO_PATIENTS.map(normalizePatient);
    State.user = 'Demo';
    document.getElementById('settingsBtn').style.display = 'none';
    render();
    showDemoBanner();
    return;
  }

  if (!API.url) { renderSetup(); return; }
  document.getElementById('settingsBtn').style.display = 'grid';

  showLoading('กำลังเชื่อมต่อ Google Apps Script...');
  try {
    const ping = await API.ping();
    State.user = ping.user;
    await loadAll(true);
    hideLoading();
    render();
  } catch (err) {
    hideLoading();
    renderSetup(err.message);
  }

  // Auto-refresh when tab becomes visible (after >30s away)
  let hiddenAt = null;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) hiddenAt = Date.now();
    else if (hiddenAt && Date.now() - hiddenAt > 30000) {
      loadAll(true).then(() => render());
    }
  });

  // Background poll every 60s
  setInterval(() => {
    if (!document.hidden && API.url) loadAll(true).then(() => {
      if (State.view === 'list') renderList();
    });
  }, 60000);
})();

function showDemoBanner() {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2000;padding:8px 16px;background:#fef3c7;color:#92400e;border-bottom:1px solid #fcd34d;font-size:13px;font-weight:500;text-align:center;letter-spacing:.2px;';
  b.innerHTML = '🧪 โหมดทดลอง (Demo) — ข้อมูลตัวอย่างในหน่วยความจำเท่านั้น ไม่บันทึกไปยัง Google Sheets · <a href="' + location.pathname + '" style="color:#92400e;text-decoration:underline;">ออกจากโหมดทดลอง</a>';
  document.body.appendChild(b);
  document.body.style.paddingTop = '36px';
}
</script>
