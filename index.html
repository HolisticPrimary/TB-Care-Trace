<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบติดตามผู้ป่วยวัณโรคและการเยี่ยมบ้าน | TB Care Trace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ec;
    --bg-elevated: #fdfbf6;
    --surface: #ffffff;
    --ink-900: #1a2620;
    --ink-700: #3d4d44;
    --ink-500: #6b7770;
    --ink-300: #a8b1ab;
    --ink-200: #d4d8d3;
    --border: #e6e2d8;
    --border-strong: #cfcabd;

    --primary: #2d4f3f;
    --primary-soft: #e4ede7;
    --primary-dark: #1d3a2c;
    --primary-glow: rgba(45, 79, 63, 0.20);

    --accent: #c97560;
    --accent-soft: #f5e4dd;

    --warning: #c89832;
    --warning-soft: #f5ecd5;

    --danger: #b3463e;
    --danger-soft: #f5dcd9;

    --success: #4a7a5a;
    --success-soft: #dfeae1;

    /* Chart palette — adapts per theme */
    --chart-primary: #2d4f3f;
    --chart-primary-lite: #5a8073;
    --chart-success: #4a7a5a;
    --chart-warning: #c89832;
    --chart-danger: #b3463e;
    --chart-accent: #c97560;
    --chart-neutral: #a8b1ab;
    --chart-blue: #4a6f8a;

    /* Body background gradients (theme-aware) */
    --bg-gradient-a: rgba(45, 79, 63, 0.04);
    --bg-gradient-b: rgba(201, 117, 96, 0.04);

    /* Cover decoration blobs */
    --cover-blob-a: #cfe3da;
    --cover-blob-b: #dde9ed;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 22px;

    --shadow-sm: 0 1px 2px rgba(26, 38, 32, 0.04), 0 1px 3px rgba(26, 38, 32, 0.06);
    --shadow: 0 4px 12px rgba(26, 38, 32, 0.06), 0 1px 2px rgba(26, 38, 32, 0.04);
    --shadow-lg: 0 12px 32px rgba(26, 38, 32, 0.12), 0 4px 8px rgba(26, 38, 32, 0.06);

    --font-thai: "IBM Plex Sans Thai", "Sarabun", system-ui, sans-serif;
    --font-display: "Outfit", "IBM Plex Sans Thai", "Sarabun", system-ui, sans-serif;
    --font-formal: "Sarabun", "IBM Plex Sans Thai", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  [data-theme="dark"] {
    /* Base — neutral warm slate (less green-saturated for less eye strain) */
    --bg: #16181c;
    --bg-elevated: #1e2228;
    --surface: #262b32;

    /* Text — soft warm off-white for reduced glare */
    --ink-900: #e7eaee;
    --ink-700: #b3bac1;
    --ink-500: #828a92;
    --ink-300: #565d65;
    --ink-200: #353b43;

    /* Borders — clearly visible against surfaces */
    --border: #353a42;
    --border-strong: #464d56;

    /* Primary — vibrant warm mint, "pops" on neutral bg without harshness */
    --primary: #6fd3a0;
    --primary-soft: #1b3328;
    --primary-dark: #58be8a;
    --primary-glow: rgba(111, 211, 160, 0.22);

    /* Accent — soft peach (warm complement) */
    --accent: #ed9f80;
    --accent-soft: #3a261f;

    /* Warning — soft amber */
    --warning: #ecbf74;
    --warning-soft: #382e18;

    /* Danger — desaturated coral (not too aggressive) */
    --danger: #e08079;
    --danger-soft: #3a201e;

    /* Success — fresh mint that pairs with primary */
    --success: #81d9a0;
    --success-soft: #1d3329;

    /* Chart palette — calibrated for dark surface visibility */
    --chart-primary: #6fd3a0;
    --chart-primary-lite: #a0e3bf;
    --chart-success: #81d9a0;
    --chart-warning: #ecbf74;
    --chart-danger: #e08079;
    --chart-accent: #ed9f80;
    --chart-neutral: #6f7884;
    --chart-blue: #87b3d4;

    /* Background ambient glow — gentle warm + cool pair */
    --bg-gradient-a: rgba(111, 211, 160, 0.05);
    --bg-gradient-b: rgba(237, 159, 128, 0.04);

    /* Cover decoration blobs — subtle paired tints */
    --cover-blob-a: #1f3527;
    --cover-blob-b: #2c2820;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.20), 0 1px 3px rgba(0, 0, 0, 0.28);
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.32), 0 1px 2px rgba(0, 0, 0, 0.20);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.45), 0 4px 8px rgba(0, 0, 0, 0.28);
  }

  html { color-scheme: light dark; }
  html[data-theme="dark"] { color-scheme: dark; }
  html[data-theme="light"] { color-scheme: light; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink-900);
    font-family: var(--font-thai);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    margin: 0;
    transition: background-color .35s ease, color .35s ease;
  }
  /* Make body a flex column so <main> can grow to fill remaining viewport height — eliminates any empty cream/dark area below content */
  body {
    display: flex;
    flex-direction: column;
  }

  body {
    background-image:
      radial-gradient(ellipse 1200px 600px at 0% 0%, var(--bg-gradient-a), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 100%, var(--bg-gradient-b), transparent 60%);
  }

  /* Smoothly fade surfaces when theme switches */
  .stat-card, .kpi-card, .dash-card, .patient-row, .modal, .setup-card,
  .cover-feature, .cover-logo-wrap, .nav-tab, .btn, .input, .select, .textarea,
  .info-item, .contact-card, .attention-row, .zone-table {
    transition: background-color .3s ease, border-color .3s ease, color .25s ease;
  }

  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

  /* ── HEADER ────────────────────────────────────────────────── */
  .app-header {
    position: relative;
    isolation: isolate;
    /* Deep navy hero strip — matches reference poster background */
    background:
      radial-gradient(ellipse 70% 90% at 95% 30%, rgba(118, 165, 215, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse 60% 70% at 10% 80%, rgba(20, 45, 80, 0.55) 0%, transparent 65%),
      linear-gradient(135deg, #0d2542 0%, #112e4c 45%, #163758 100%);
    border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    min-height: 130px;
    padding: 20px 0 18px;
    margin-bottom: 0;
    overflow: hidden;
    /* Force light-text appearance regardless of theme */
    color: #f5f7fb;
  }
  /* Subtle decorative gloss on top */
  .app-header::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 900px 260px at 50% -50%, rgba(255,255,255,0.06), transparent 70%);
  }
  /* On LIST + DASHBOARD views: wide decorative banner strip (brand moves to subnav) */
  body[data-view="list"] .app-header,
  body[data-view="dashboard"] .app-header {
    min-height: 280px;
    padding: 0;
    background:
      /* Lighter overlay — let the image breathe */
      linear-gradient(180deg,
        rgba(13, 37, 66, 0.32) 0%,
        rgba(13, 37, 66, 0.45) 60%,
        rgba(13, 37, 66, 0.78) 100%),
      radial-gradient(ellipse 60% 80% at 95% 30%, rgba(118, 165, 215, 0.18) 0%, transparent 60%),
      /* Image larger, positioned to show focal content */
      url('./cover-banner.png') center 32% / 100% auto no-repeat,
      linear-gradient(135deg, #0d2542 0%, #112e4c 45%, #163758 100%);
    background-color: #0d2542;
  }
  /* Hide empty header-inner on list/dashboard (no content) — keep banner visible */
  body[data-view="list"] .header-inner,
  body[data-view="dashboard"] .header-inner {
    min-height: 0;
    height: 280px;
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 clamp(20px, 3vw, 48px);
  }
  .header-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 clamp(20px, 3vw, 48px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    min-height: 90px;
  }
  body[data-view="list"] .header-inner,
  body[data-view="dashboard"] .header-inner { min-height: 140px; }

  /* ── SUBNAV BAR (below header) — distinctive brand-tinted background ─ */
  .subnav {
    position: sticky;
    top: 0;
    z-index: 50;
    /* Soft brand gradient: mint → cream, ties in with system identity */
    background:
      linear-gradient(180deg,
        var(--primary-soft) 0%,
        var(--bg-elevated) 100%);
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 8px rgba(45, 79, 63, 0.04);
  }
  /* Top accent line — brand color gradient bar for visual separation from navy header */
  .subnav::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      var(--primary) 0%,
      var(--success) 50%,
      var(--primary) 100%);
    opacity: 0.85;
  }
  [data-theme="dark"] .subnav {
    background:
      linear-gradient(180deg,
        rgba(111, 211, 160, 0.08) 0%,
        rgba(22, 24, 28, 0.95) 100%);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
  }
  [data-theme="dark"] .subnav::before {
    opacity: 0.7;
  }
  .subnav-inner {
    width: 100%;
    max-width: 1500px;
    margin: 0 auto;
    padding: 14px clamp(20px, 3vw, 48px);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
  }
  /* Brand slot — LEFT aligned */
  .subnav-brand-slot {
    display: flex;
    align-items: center;
    justify-self: start;
  }
  /* Nav tabs — CENTER */
  .subnav .nav-tabs {
    justify-self: center;
  }
  /* Right side of subnav — sync indicator + theme toggle + settings — RIGHT aligned */
  .subnav-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-self: end;
  }
  /* Brand pill when relocated into subnav — light styling */
  .brand.brand-in-subnav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 14px 6px 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    gap: 12px;
  }
  .brand.brand-in-subnav .brand-mark.has-logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    padding: 3px;
  }
  .brand.brand-in-subnav .brand-text h1 {
    color: var(--ink-900);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.1px;
    text-shadow: none;
    line-height: 1.25;
    /* Truncate long title gracefully */
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .brand.brand-in-subnav .brand-text p {
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: none;
    margin-top: 2px;
  }
  .brand.brand-in-subnav:hover {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
  }
  [data-theme="dark"] .brand.brand-in-subnav {
    background: var(--surface);
    border-color: var(--border);
  }
  [data-theme="dark"] .brand.brand-in-subnav:hover {
    background: var(--bg-elevated);
  }
  /* Mobile responsive: stack subnav vertically */
  @media (max-width: 980px) {
    .subnav-inner {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .subnav-brand-slot, .subnav .nav-tabs, .subnav-actions {
      justify-self: stretch;
    }
    .subnav .nav-tabs { justify-content: center; }
    .subnav-actions { justify-content: flex-end; }
    .brand.brand-in-subnav .brand-text h1 { max-width: none; font-size: 14px; }
  }
  @media (max-width: 640px) {
    .brand.brand-in-subnav .brand-text h1 { white-space: normal; }
  }
  /* Sync indicator inside subnav — light bg, dark text */
  .subnav-actions .sync-indicator {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--ink-700);
    font-weight: 600;
    font-size: 12px;
    padding: 6px 4px 6px 12px;
    text-shadow: none;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
  }
  .subnav-actions .sync-indicator .sync-dot {
    background: var(--success);
    box-shadow: 0 0 8px rgba(74, 122, 90, 0.5);
    width: 7px;
    height: 7px;
  }
  [data-theme="dark"] .subnav-actions .sync-indicator .sync-dot {
    background: #6fd3a0;
    box-shadow: 0 0 8px rgba(111, 211, 160, 0.6);
  }
  .subnav-actions .sync-indicator button {
    color: var(--primary);
    background: var(--primary-soft);
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 4px 11px;
    margin-left: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: background .15s, color .15s, transform .15s;
  }
  .subnav-actions .sync-indicator button:hover {
    background: var(--primary);
    color: #ffffff;
    transform: translateY(-1px);
  }
  /* Icon buttons inside subnav — dark icons on light surface */
  .subnav-actions .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    color: var(--ink-700);
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
    transition: background .15s, color .15s, border-color .15s, transform .15s;
  }
  .subnav-actions .icon-btn:hover {
    background: var(--primary-soft);
    color: var(--primary);
    border-color: var(--primary-soft);
    transform: translateY(-1px);
  }
  .subnav-actions .theme-toggle .icon-moon { color: var(--primary); }
  .subnav-actions .theme-toggle .icon-sun { color: var(--warning); }
  [data-theme="dark"] .subnav-actions .theme-toggle .icon-moon { color: var(--primary); }
  [data-theme="dark"] .subnav-actions .theme-toggle .icon-sun { color: var(--warning); }
  @media (max-width: 720px) {
    .subnav-inner { gap: 10px; }
    .subnav-actions { gap: 6px; }
    .subnav-actions .sync-indicator { font-size: 11px; padding: 5px 4px 5px 10px; }
  }
  /* nav-tabs inside subnav (light bg) — override the previous header-actions navy style */
  .subnav .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .subnav .nav-tab {
    color: var(--ink-700);
    font-weight: 600;
  }
  .subnav .nav-tab:hover {
    color: var(--ink-900);
    background: var(--bg-elevated);
  }
  .subnav .nav-tab.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow:
      0 3px 10px rgba(45, 79, 63, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  [data-theme="dark"] .subnav .nav-tab.active {
    box-shadow:
      0 3px 12px rgba(111, 211, 160, 0.30),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  @media (max-width: 720px) {
    .subnav-inner { padding: 8px 16px; }
  }
  /* ── HEADER TYPOGRAPHY (on navy bg) ───────────────────────── */
  /* Primary title — pure white, refined weight, subtle depth shadow */
  .app-header .brand-text h1 {
    color: #ffffff;
    font-weight: 700;
    letter-spacing: -0.2px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28), 0 0 1px rgba(0, 0, 0, 0.15);
  }
  /* Subtitle — mint accent (ties to TB Care Trace brand color) */
  .app-header .brand-text p {
    color: #7dd3a8;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }
  /* Brand pill — translucent white-tinted glass */
  .brand.brand-clickable {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 18px;
    padding: 10px 18px 10px 12px;
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  .brand.brand-clickable:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.30);
  }
  /* Actions pill — same glass treatment */
  .header-actions {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 999px;
    padding: 4px 6px 4px 6px;
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  /* Icon buttons inside header — refined white with hover lift */
  .app-header .icon-btn {
    color: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.16);
    background: rgba(255, 255, 255, 0.06);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .app-header .icon-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.30);
  }
  .app-header .theme-toggle .icon-moon { color: #e2e8f0; }
  .app-header .theme-toggle .icon-sun { color: #fcd34d; }
  /* Sync indicator: transparent (inherits actions pill glass) + bright text */
  .app-header .sync-indicator {
    background: transparent;
    border: 0;
    padding: 6px 10px 6px 14px;
    color: #ffffff;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.2px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }
  /* Dot — bright mint green, glowing */
  .app-header .sync-indicator .sync-dot {
    background: #6fd3a0;
    box-shadow: 0 0 8px rgba(111, 211, 160, 0.6);
    width: 7px;
    height: 7px;
  }
  .app-header .sync-indicator .sync-dot.syncing { background: #fcd34d; box-shadow: 0 0 8px rgba(252, 211, 77, 0.6); }
  .app-header .sync-indicator .sync-dot.error { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.6); }
  /* Refresh button — clean separator + bright white */
  .app-header .sync-indicator button {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.20);
    border-left: 1px solid rgba(255, 255, 255, 0.20);
    border-radius: 8px;
    padding: 4px 11px;
    margin-left: 8px;
    padding-left: 11px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .app-header .sync-indicator button:hover {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.35);
    transform: translateY(-1px);
  }
  /* Nav tabs — translucent glass; active uses primary with glow */
  .app-header .nav-tabs {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10);
  }
  .app-header .nav-tab {
    color: rgba(245, 247, 251, 0.85);
    font-weight: 600;
  }
  .app-header .nav-tab:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.08);
  }
  .app-header .nav-tab.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow:
      0 4px 14px rgba(45, 79, 63, 0.45),
      inset 0 1px 0 rgba(255, 255, 255, 0.20);
  }
  /* Mobile shrink */
  @media (max-width: 720px) {
    .app-header { min-height: 140px; }
    .header-inner { min-height: 100px; }
    .brand.brand-clickable, .header-actions { padding: 6px 10px; border-radius: 14px; }
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--primary);
    display: grid;
    place-items: center;
    color: #f7f3ec;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 20px;
    box-shadow: var(--shadow);
  }
  .brand-text h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .brand-text p {
    font-size: 13px;
    color: var(--ink-500);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-500);
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  .sync-dot.syncing { background: var(--warning); animation: spin 0.7s linear infinite; }
  .sync-dot.error { background: var(--danger); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-indicator button {
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border-left: 1px solid var(--border);
    padding-left: 8px;
    margin-left: 4px;
    transition: color 0.15s;
  }
  .sync-indicator button:hover { color: var(--primary-dark); }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    color: var(--ink-500);
    display: grid;
    place-items: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bg-elevated); color: var(--ink-900); }

  /* Theme toggle — show/hide sun vs moon */
  .theme-toggle {
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .theme-toggle:hover { border-color: var(--border-strong); }
  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon {
    position: absolute;
    transition: transform .4s cubic-bezier(.22,.61,.36,1), opacity .25s ease;
  }
  /* Light mode → show moon (action: go to dark) */
  .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.6); }
  .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); color: var(--primary); }
  /* Dark mode → show sun (action: go to light) */
  [data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); color: var(--warning); }
  [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.6); }

  /* ── MAIN LAYOUT ───────────────────────────────────────────── */
  main {
    /* Grow to fill remaining viewport height (parent body is flex-column) */
    flex: 1 0 auto;
    background: var(--bg);
  }
  .container {
    width: 100%;
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 clamp(20px, 3vw, 48px) 32px;
  }
  /* Empty UI container slots — must not contribute to layout */
  #modalRoot:empty,
  #viewerRoot:empty,
  #toastRoot:empty,
  #loadingRoot:empty {
    display: none;
  }

  /* ── STATS GRID ────────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .stat-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--c, var(--primary));
  }
  .stat-label {
    font-size: 12px;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .stat-value .unit {
    font-size: 13px;
    color: var(--ink-500);
    font-weight: 400;
    margin-left: 4px;
  }

  /* ── TOOLBAR ───────────────────────────────────────────────── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 260px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(45, 79, 63, 0.1);
  }
  .search-box svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-300);
  }

  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #f7f3ec; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink-700);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .btn-ghost {
    color: var(--ink-700);
    padding: 8px 12px;
  }
  .btn-ghost:hover { background: var(--primary-soft); color: var(--primary-dark); }
  .btn-danger {
    background: var(--surface);
    color: var(--danger);
    border: 1px solid var(--danger-soft);
  }
  .btn-danger:hover { background: var(--danger-soft); }

  /* ── FILTER TABS ───────────────────────────────────────────── */
  .filters {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    padding: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }
  .filter-btn {
    padding: 9px 16px;
    border-radius: 9px;
    font-size: 13px;
    color: var(--ink-500);
    transition: background .2s, color .2s, box-shadow .2s;
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .filter-btn:hover {
    color: var(--ink-900);
    background: rgba(45, 79, 63, 0.06);
  }
  [data-theme="dark"] .filter-btn:hover {
    background: rgba(111, 211, 160, 0.10);
  }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #ffffff;
    box-shadow:
      0 3px 10px rgba(45, 79, 63, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  [data-theme="dark"] .filter-btn.active {
    box-shadow:
      0 3px 12px rgba(111, 211, 160, 0.30),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  .filter-btn .count {
    margin-left: 6px;
    font-size: 11px;
    color: var(--ink-500);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  .filter-btn.active .count {
    color: rgba(255, 255, 255, 0.85);
  }

  /* ── PATIENT LIST ──────────────────────────────────────────── */
  .patient-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .patient-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .patient-card:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  /* Row layout */
  .patient-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .patient-row-header {
    display: grid;
    grid-template-columns: minmax(220px, 1.7fr) 110px 110px 140px minmax(170px, 1.1fr) 120px;
    gap: 14px;
    padding: 12px 18px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--ink-500);
  }
  .patient-row {
    display: grid;
    grid-template-columns: minmax(220px, 1.7fr) 110px 110px 140px minmax(170px, 1.1fr) 120px;
    gap: 14px;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .patient-row:last-child { border-bottom: none; }
  .patient-row:hover { background: var(--bg-elevated); }
  .patient-row-name .name {
    font-family: var(--font-display);
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink-900);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .patient-row-name .meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-500);
  }
  .patient-row-name .meta .sep {
    width: 3px; height: 3px;
    background: var(--ink-300);
    border-radius: 50%;
  }
  .row-chip {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 6px;
    background: var(--bg-elevated);
    color: var(--ink-700);
    border: 1px solid var(--border);
    letter-spacing: 0.2px;
    line-height: 1.4;
  }
  .row-chip.zone-in { background: var(--primary-soft); color: var(--primary-dark); border-color: transparent; }
  .row-chip.zone-out { background: #fef3c7; color: #92400e; border-color: transparent; }
  .row-chip.muted { color: var(--ink-500); }
  .row-mini-progress {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11.5px;
    color: var(--ink-500);
  }
  .row-mini-progress .nums { font-variant-numeric: tabular-nums; }
  .row-mini-progress .nums strong { color: var(--ink-900); font-weight: 600; }
  .row-mini-progress .bar {
    height: 5px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .row-mini-progress .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
    border-radius: 999px;
  }
  .row-visit {
    font-size: 12.5px;
    color: var(--ink-500);
    display: flex;
    flex-direction: column;
    gap: 3px;
    line-height: 1.4;
  }
  .row-visit .count { font-size: 11px; color: var(--ink-500); }
  .row-visit .attention {
    color: var(--accent);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  /* Required field indicator + error state */
  .form-group label .req {
    color: var(--danger);
    font-weight: 700;
    margin-left: 2px;
  }
  .form-group.has-error label { color: var(--danger); }
  .form-group.has-error .input,
  .form-group.has-error .select,
  .form-group.has-error .textarea,
  .form-group.has-error .pill-group {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(179, 70, 62, 0.10);
  }
  .form-group.has-error .pill-group {
    box-shadow: 0 0 0 1px var(--danger), 0 0 0 4px rgba(179, 70, 62, 0.10);
  }
  .form-group .field-error {
    display: none;
    margin-top: 5px;
    font-size: 12px;
    color: var(--danger);
    font-weight: 500;
    align-items: center;
    gap: 4px;
  }
  .form-group.has-error .field-error { display: inline-flex; }
  /* Banner alert at top of modal when form has errors */
  .form-alert {
    display: none;
    margin-bottom: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid rgba(179, 70, 62, 0.20);
    font-size: 13px;
    font-weight: 600;
    align-items: center;
    gap: 8px;
  }
  .form-alert.show { display: flex; }
  [data-theme="dark"] .form-alert {
    background: rgba(224, 128, 121, 0.14);
    color: #e08079;
    border-color: rgba(224, 128, 121, 0.28);
  }

  /* Visit-count badge — unified status pill (count + recency in one) */
  .visit-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1px;
    white-space: nowrap;
    border: 1px solid transparent;
    line-height: 1.2;
  }
  .visit-badge strong {
    font-weight: 700;
    font-size: 12.5px;
  }
  .visit-badge .vb-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 0 0 currentColor;
    flex-shrink: 0;
  }
  .visit-badge .vb-sep {
    opacity: 0.45;
    font-weight: 700;
  }
  .visit-badge .vb-meta {
    opacity: 0.85;
    font-weight: 500;
  }
  /* No visits / one visit — red urgent */
  .visit-badge.vb-none,
  .visit-badge.vb-low {
    background: var(--danger-soft);
    color: var(--danger);
    border-color: rgba(179, 70, 62, 0.22);
  }
  .visit-badge.vb-none .vb-dot,
  .visit-badge.vb-low .vb-dot {
    animation: vbPulse 2s ease-in-out infinite;
  }
  @keyframes vbPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(179, 70, 62, 0.55); }
    50%      { box-shadow: 0 0 0 5px rgba(179, 70, 62, 0); }
  }
  /* 2+ visits — green OK */
  .visit-badge.vb-ok {
    background: var(--success-soft);
    color: var(--success);
    border-color: rgba(74, 122, 90, 0.22);
  }
  /* Dark mode variants */
  [data-theme="dark"] .visit-badge.vb-none,
  [data-theme="dark"] .visit-badge.vb-low {
    background: rgba(224, 128, 121, 0.14);
    color: #e08079;
    border-color: rgba(224, 128, 121, 0.30);
  }
  [data-theme="dark"] .visit-badge.vb-none .vb-dot,
  [data-theme="dark"] .visit-badge.vb-low .vb-dot {
    animation: vbPulseDark 2s ease-in-out infinite;
  }
  @keyframes vbPulseDark {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224, 128, 121, 0.55); }
    50%      { box-shadow: 0 0 0 5px rgba(224, 128, 121, 0); }
  }
  [data-theme="dark"] .visit-badge.vb-ok {
    background: rgba(129, 217, 160, 0.12);
    color: #81d9a0;
    border-color: rgba(129, 217, 160, 0.30);
  }
  .row-status { display: flex; justify-content: flex-end; }
  @media (max-width: 980px) {
    .patient-row-header { display: none; }
    .patient-row {
      grid-template-columns: 1fr auto;
      grid-template-areas:
        'name status'
        'chips chips'
        'progress progress'
        'visit visit';
      gap: 10px;
    }
    .patient-row-name { grid-area: name; }
    .patient-row .row-status { grid-area: status; align-self: start; }
    .patient-row .row-chips { grid-area: chips; display: flex; flex-wrap: wrap; gap: 6px; }
    .patient-row .row-mini-progress { grid-area: progress; }
    .patient-row .row-visit { grid-area: visit; }
    .patient-row .col-type,
    .patient-row .col-test { display: none; }
  }
  @media (min-width: 981px) {
    .row-chips { display: none; }
  }
  .patient-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .patient-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: -0.2px;
    margin-bottom: 3px;
  }
  .patient-meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--ink-500);
    align-items: center;
  }
  .patient-meta .sep {
    width: 3px;
    height: 3px;
    background: var(--ink-300);
    border-radius: 50%;
  }
  .hn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-700);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .status {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.3px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-active { background: var(--primary-soft); color: var(--primary-dark); }
  .status-cured { background: var(--success-soft); color: var(--success); }
  .status-treatmentComplete { background: #dbeafe; color: #1e40af; }
  .status-lost { background: var(--warning-soft); color: var(--warning); }
  .status-transferred { background: #e8e3f0; color: #5d4a8a; }
  .status-died { background: #ebe7e4; color: #5a4a44; }
  .status-diagnosisChange { background: #fef3c7; color: #92400e; }

  /* Status pills — dark mode variants (paired warm/cool tints) */
  [data-theme="dark"] .status-active { background: var(--primary-soft); color: var(--primary); }
  [data-theme="dark"] .status-treatmentComplete { background: #1d2f4a; color: #9cc3ec; }
  [data-theme="dark"] .status-transferred { background: #2c2840; color: #c4b8e0; }
  [data-theme="dark"] .status-died { background: #2a2724; color: #aaa39a; }
  [data-theme="dark"] .status-diagnosisChange { background: #382e16; color: #ecc874; }

  .treatment-progress {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-500);
    margin-bottom: 6px;
  }
  .progress-label strong { color: var(--ink-900); font-weight: 600; font-variant-numeric: tabular-nums; }
  .progress-bar {
    height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .patient-footer {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-500);
  }
  .last-visit-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .alert-tag { color: var(--accent); font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-500);
  }
  .empty-state-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: var(--bg-elevated);
    display: grid;
    place-items: center;
    color: var(--ink-300);
  }
  .empty-state h3 {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--ink-700);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .empty-state p { font-size: 14px; max-width: 320px; margin: 0 auto 20px; }

  /* ── DETAIL VIEW ───────────────────────────────────────────── */
  .detail-view { animation: slideIn 0.25s ease; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .detail-header::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--primary-soft) 0%, transparent 70%);
    opacity: 0.6;
    pointer-events: none;
  }
  /* Breadcrumb with elevated layer pill design */
  .breadcrumb {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-500);
    margin-bottom: 16px;
    padding: 5px 5px 5px 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow:
      0 2px 6px rgba(0, 0, 0, 0.04),
      inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }
  [data-theme="dark"] .breadcrumb {
    background: var(--bg-elevated);
    box-shadow:
      0 2px 6px rgba(0, 0, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }
  .breadcrumb button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--primary);
    font-weight: 600;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--primary-soft);
    border: 1px solid transparent;
    transition: background .18s ease, color .18s ease, transform .15s ease, box-shadow .18s ease;
  }
  .breadcrumb button:hover {
    background: var(--primary);
    color: #ffffff;
    transform: translateX(-2px);
    box-shadow: 0 3px 10px rgba(45, 79, 63, 0.25);
  }
  [data-theme="dark"] .breadcrumb button:hover {
    box-shadow: 0 3px 10px rgba(111, 211, 160, 0.30);
  }

  /* DOT Calendar */
  .dot-grid {
    display: grid;

    gap: 6px;
    margin-top: 16px;
  }
  .dot-day {

    place-items: center;
    font-size: 11px;
    color: var(--ink-500);

    transition: all 0.12s;
    font-variant-numeric: tabular-nums;
    border: 1px solid transparent;
    font-weight: 500;
  }
  .dot-day:hover { border-color: var(--border-strong); transform: scale(1.05); }
  .dot-day.taken { background: var(--success); color: white; }
  .dot-day.missed { background: var(--danger); color: white; }
  .dot-day.today { border-color: var(--primary); border-width: 2px; }

  .dot-legend {

  .timeline {

    padding-left: 20px;

  .timeline::before {
    content: "";

    left: 6px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: var(--border);
  }
  .timeline-item { position: relative; padding-bottom: 18px; }

    content: "";

  /* ── MODAL ─────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 18, 14, 0.5);

    display: grid;
    place-items: center;
    padding: 20px;
    z-index: 100;
    animation: fadeIn 0.18s ease;
  }
  [data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, 0.6); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-xl);
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.22s ease;
  }
  @keyframes modalIn {

  .modal-header {

  .modal-title {

  .modal-close {

    height: 32px;

  .modal-close:hover { background: var(--bg); color: var(--ink-900); }
  .modal-body { padding: 24px 28px; }
  .modal-footer {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-radius: 0 0 var(--radius-xl) var(--radius-xl);

  /* ── FORMS ─────────────────────────────────────────────────── */
  .form-row {

  .form-group label {

  .input, .textarea, .select {

  .contact-card {

  .pill-group {

  .check-grid {

  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }

  .check-item.checked {
    background: var(--accent-soft);

    width: 18px;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px 20px;
    border: 1.5px dashed var(--border-strong);
    border-radius: 14px;
    background: var(--bg-elevated);
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
  }
  .photo-uploader:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
  }
  .photo-uploader:active { transform: scale(.995); }
  .photo-uploader input { display: none; }
  .photo-uploader .upload-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--primary);
    border: 1px solid var(--border);
    transition: background .18s, color .18s, border-color .18s;
  }
  .photo-uploader:hover .upload-icon {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .photo-uploader .upload-icon svg { width: 24px; height: 24px; }
  .photo-uploader .upload-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-900);
    margin: 0;
  }
  .photo-uploader .upload-title .accent { color: var(--primary); }
  .photo-uploader .upload-sub {
    font-size: 12px;
    color: var(--ink-500);
    margin: 0;
    text-align: center;
    line-height: 1.55;
  }
  .photo-uploader .upload-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 2px;
  }
  .photo-uploader .upload-chip {
    font-size: 11px;
    color: var(--ink-700);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 999px;
  }

  .photo-preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .photo-preview {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    background-color: var(--bg);
    border: 1px solid var(--border);
  }
  .photo-preview.uploading::after {
    content: "อัพโหลด...";
    position: absolute;
    inset: 0;
    background: rgba(45, 79, 63, 0.7);
    color: white;
    display: grid;
    place-items: center;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .photo-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(26, 38, 32, 0.7);
    color: white;
    display: grid;
    place-items: center;
    font-size: 12px;
  }
  .photo-remove:hover { background: var(--danger); }

  .image-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: grid;
    place-items: center;
    z-index: 200;
    padding: 40px;
    cursor: zoom-out;
  }
  .image-viewer img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .image-viewer-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    display: grid;
    place-items: center;
    font-size: 18px;
  }
  .image-viewer-close:hover { background: rgba(255, 255, 255, 0.2); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink-900);
    color: #fdfbf6;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    z-index: 300;
    animation: toastIn 0.25s ease;
    max-width: 90vw;
  }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── LOADING / SETUP SCREENS ───────────────────────────────── */
  .full-screen {
    min-height: 70vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 40px;
    max-width: 540px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .setup-card h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }
  .setup-card p {
    color: var(--ink-500);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .setup-steps {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink-700);
    line-height: 1.8;
  }
  .setup-steps strong { color: var(--ink-900); }
  .setup-steps code {
    font-family: var(--font-mono);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--primary-dark);
  }

  .spinner-big {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(247, 243, 236, 0.75);
    backdrop-filter: blur(2px);
    display: grid;
    place-items: center;
    z-index: 500;
    animation: fadeIn 0.15s ease;
  }
  .loading-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 28px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .loading-card .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .loading-card span {
    font-size: 14px;
    color: var(--ink-700);
  }

  /* ── SKELETON LOADERS ──────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg,
      var(--bg-elevated) 0%,
      var(--border) 50%,
      var(--bg-elevated) 100%);
    background-size: 200% 100%;
    animation: skeletonShimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  @keyframes skeletonShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-line { height: 12px; margin-bottom: 8px; }
  .skeleton-line.thin { height: 8px; }
  .skeleton-line.thick { height: 18px; }
  .skeleton-block { height: 84px; border-radius: 10px; margin-bottom: 12px; }
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .skeleton-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .skeleton-row {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .skeleton-row .left { flex: 1; }
  .skeleton-row .right { flex: 0 0 auto; }

  /* ── EMPTY STATES ──────────────────────────────────────────── */
  .empty-state-modern {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 64px 24px;
    text-align: center;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 16px;
  }
  .empty-state-modern .empty-illust {
    width: 96px;
    height: 96px;
    margin-bottom: 22px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary-soft), var(--bg-elevated));
    color: var(--primary);
    position: relative;
  }
  .empty-state-modern .empty-illust::after {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--primary-soft) 0%, transparent 70%);
    opacity: 0.5;
    z-index: -1;
  }
  .empty-state-modern .empty-illust svg { width: 44px; height: 44px; }
  .empty-state-modern h3 {
    font-family: var(--font-formal);
    font-size: 18px;
    font-weight: 700;
    color: var(--ink-900);
    margin: 0 0 8px;
    letter-spacing: -0.1px;
  }
  .empty-state-modern p {
    font-family: var(--font-formal);
    font-size: 14px;
    color: var(--ink-500);
    line-height: 1.6;
    margin: 0 0 22px;
    max-width: 380px;
  }
  .empty-state-modern .btn {
    padding: 11px 22px;
    font-weight: 700;
    box-shadow: 0 6px 16px rgba(45, 79, 63, 0.20);
  }
  [data-theme="dark"] .empty-state-modern .btn {
    box-shadow: 0 6px 16px rgba(111, 211, 160, 0.22);
  }

  /* ── PAGE TRANSITIONS ──────────────────────────────────────── */
  @keyframes pageEnterUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #mainView > .stats,
  #mainView > .toolbar,
  #mainView > .filter-bar,
  #mainView > .patient-list-wrap,
  #mainView > .detail-view,
  #mainView > .dash-head,
  #mainView > .kpi-grid,
  #mainView > .dash-grid {
    animation: pageEnterUp .35s cubic-bezier(.22,.61,.36,1) both;
  }
  #mainView > *:nth-child(2) { animation-delay: .05s; }
  #mainView > *:nth-child(3) { animation-delay: .10s; }
  #mainView > *:nth-child(4) { animation-delay: .15s; }
  #mainView > *:nth-child(5) { animation-delay: .20s; }
  #mainView > *:nth-child(6) { animation-delay: .25s; }
  @media (prefers-reduced-motion: reduce) {
    #mainView > * { animation: none !important; }
  }

  /* ── COUNT-UP ANIMATION ──────────────────────────────────── */
  .count-up { display: inline-block; font-variant-numeric: tabular-nums; }

  /* ── PRINT STYLESHEET ──────────────────────────────────────── */
  @media print {
    @page { size: A4; margin: 14mm 12mm; }
    html, body {
      background: white !important;
      color: #000 !important;
      font-size: 11pt;
    }
    body::before {
      content: "TB Care Trace · ระบบติดตามผู้ป่วยวัณโรค · โรงพยาบาลทับคล้อ";
      display: block;
      font-size: 9pt;
      color: #666;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    body::after {
      content: "พิมพ์เมื่อ " attr(data-print-date) " · TB Care Trace";
      position: fixed;
      bottom: 8mm;
      left: 12mm;
      right: 12mm;
      font-size: 8pt;
      color: #999;
      text-align: center;
      border-top: 1px solid #ddd;
      padding-top: 6px;
    }
    /* Hide non-content elements */
    .app-header, .header-actions, .nav-tabs, .icon-btn, .theme-toggle, .modal-backdrop,
    .toolbar, .filter-bar, .row-actions, .add-btn, .breadcrumb button,
    .btn, .photo-uploader, .modal-footer, #toastRoot, .sync-indicator,
    .cover, .dash-head .dash-range, [onclick] { display: none !important; }
    /* Show titles + data only */
    .container { max-width: 100% !important; padding: 0 !important; }
    .detail-view, .stats, .dash-card, .patient-row, .info-grid, .timeline-item {
      page-break-inside: avoid;
      break-inside: avoid;
      background: white !important;
      border: 1px solid #ccc !important;
      box-shadow: none !important;
      animation: none !important;
    }
    .detail-name { font-size: 18pt !important; color: #000 !important; }
    h1, h2, h3, h4 { color: #000 !important; page-break-after: avoid; }
    .visit-badge, .status, .row-chip {
      border: 1px solid #666 !important;
      background: white !important;
      color: #000 !important;
      animation: none !important;
    }
    .skeleton, .skeleton-line, .skeleton-block { display: none !important; }
    /* Image quality */
    img { max-width: 100%; page-break-inside: avoid; }
    /* Ensure links show URL in print */
    a[href]:after { content: " (" attr(href) ")"; font-size: 8pt; color: #666; }
  }

  /* Util */
  .row-flex {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .text-muted { color: var(--ink-500); }

  /* ── COVER PAGE — Premium hero design ─────────────────────── */
  @keyframes coverFadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes coverFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes coverScaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes blobDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, -30px) scale(1.05); }
    66%      { transform: translate(-30px, 40px) scale(0.95); }
  }
  @keyframes shimmer {
    from { background-position: -200% 0; }
    to   { background-position: 200% 0; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,122,90,0.55); }
    50%      { box-shadow: 0 0 0 8px rgba(74,122,90,0); }
  }

  .cover {
    position: relative;
    display: grid;
    place-items: center;
    padding: 40px 20px 24px;
    overflow: hidden;
  }
  .cover::before,
  .cover::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    animation: blobDrift 22s ease-in-out infinite;
  }
  [data-theme="dark"] .cover::before,
  [data-theme="dark"] .cover::after { opacity: 0.85; filter: blur(110px); }
  .cover::before {
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, var(--cover-blob-a) 0%, transparent 70%);
    top: -150px;
    left: -140px;
  }
  .cover::after {
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, var(--cover-blob-b) 0%, transparent 70%);
    bottom: -130px;
    right: -120px;
    animation-delay: -8s;
    animation-direction: reverse;
  }

  .cover-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 920px;
    text-align: center;
  }

  /* Page hero banner — compact version for in-app pages (list/dashboard) */
  .page-hero {
    position: relative;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto 20px;
    border-radius: 20px;
    overflow: hidden;
    background: var(--surface);
    box-shadow:
      0 12px 32px rgba(45,79,63,0.08),
      0 4px 10px rgba(0,0,0,0.03),
      inset 0 0 0 1px var(--border);
    transition: transform .3s ease, box-shadow .3s ease;
    animation: coverFadeUp .6s ease both;
  }
  .page-hero:hover {
    transform: translateY(-2px);
    box-shadow:
      0 16px 40px rgba(45,79,63,0.10),
      0 6px 14px rgba(0,0,0,0.04),
      inset 0 0 0 1px var(--border);
  }
  [data-theme="dark"] .page-hero {
    box-shadow:
      0 12px 32px rgba(0,0,0,0.35),
      0 4px 10px rgba(0,0,0,0.22),
      inset 0 0 0 1px var(--border);
  }
  .page-hero img {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: -webkit-optimize-contrast;
  }
  .page-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.03);
  }
  [data-theme="dark"] .page-hero::after { box-shadow: inset 0 0 60px rgba(0,0,0,0.16); }

  /* Hero banner image — main visual at top of cover */
  .cover-hero {
    position: relative;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto 40px;
    border-radius: 28px;
    overflow: hidden;
    background: var(--surface);
    box-shadow:
      0 24px 60px rgba(45,79,63,0.10),
      0 8px 20px rgba(0,0,0,0.04),
      inset 0 0 0 1px var(--border);
    animation: coverScaleIn .9s cubic-bezier(.18,.89,.32,1.28) both;
    transition: transform .35s ease, box-shadow .35s ease;
  }
  .cover-hero:hover {
    transform: translateY(-4px);
    box-shadow:
      0 32px 80px rgba(45,79,63,0.14),
      0 12px 28px rgba(0,0,0,0.06),
      inset 0 0 0 1px var(--border);
  }
  [data-theme="dark"] .cover-hero {
    box-shadow:
      0 24px 60px rgba(0,0,0,0.45),
      0 8px 20px rgba(0,0,0,0.30),
      inset 0 0 0 1px var(--border);
  }
  [data-theme="dark"] .cover-hero:hover {
    box-shadow:
      0 32px 80px rgba(0,0,0,0.55),
      0 12px 28px rgba(0,0,0,0.35),
      inset 0 0 0 1px var(--border);
  }
  .cover-hero img {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: -webkit-optimize-contrast;
  }
  /* Subtle vignette to blend image edges with page */
  .cover-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] .cover-hero::after {
    box-shadow: inset 0 0 80px rgba(0,0,0,0.18);
  }

  /* Logo card with hover lift + auto float */
  .cover-logo-wrap {
    position: relative;
    display: grid;
    place-items: center;
    width: 260px;
    height: 260px;
    background: #ffffff;
    border-radius: 48px;
    box-shadow:
      0 20px 50px var(--primary-glow),
      0 6px 16px rgba(0,0,0,0.05),
      inset 0 0 0 1px var(--border);
    margin: 0 auto 32px;
    padding: 20px;
    animation: coverScaleIn .9s cubic-bezier(.18,.89,.32,1.28) both, logoFloat 5.5s ease-in-out 1s infinite;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  /* Spotlight halo behind the card (visible mostly in dark mode) */
  .cover-logo-wrap::before {
    content: "";
    position: absolute;
    inset: -40px;
    border-radius: inherit;
    background: radial-gradient(
      circle at center,
      rgba(74, 130, 230, 0.18) 0%,
      rgba(95, 174, 138, 0.10) 35%,
      transparent 70%
    );
    filter: blur(20px);
    z-index: -1;
    opacity: 0;
    transition: opacity .35s ease;
    pointer-events: none;
  }
  [data-theme="dark"] .cover-logo-wrap::before { opacity: 1; }

  .cover-logo-wrap:hover {
    transform: translateY(-6px);
    box-shadow:
      0 30px 60px var(--primary-glow),
      0 8px 22px rgba(0,0,0,0.08),
      inset 0 0 0 1px var(--border);
  }
  /* Dark mode: softer edge + ambient glow that bridges card with dark bg */
  [data-theme="dark"] .cover-logo-wrap {
    background: #ffffff;
    border-radius: 44px;
    box-shadow:
      /* Inner subtle highlight */
      inset 0 0 0 1px rgba(255, 255, 255, 0.4),
      /* Soft white ambient diffusion (eases white-to-dark transition) */
      0 0 70px 14px rgba(255, 255, 255, 0.045),
      /* Brand-color glow */
      0 24px 60px rgba(74, 130, 230, 0.22),
      0 12px 28px rgba(95, 174, 138, 0.15),
      /* Depth shadow */
      0 8px 24px rgba(0, 0, 0, 0.45);
  }
  [data-theme="dark"] .cover-logo-wrap:hover {
    transform: translateY(-6px);
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.5),
      0 0 90px 18px rgba(255, 255, 255, 0.06),
      0 30px 70px rgba(74, 130, 230, 0.30),
      0 16px 36px rgba(95, 174, 138, 0.20),
      0 10px 28px rgba(0, 0, 0, 0.50);
  }

  .cover-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    image-rendering: -webkit-optimize-contrast;
    border-radius: 28px;
  }

  /* Eyebrow status pill */
  .cover-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-family: var(--font-formal);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 22px;
    text-transform: uppercase;
    animation: coverFadeUp .7s ease both .1s;
  }
  .cover-eyebrow .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulseGlow 2.2s infinite;
  }

  /* Section headline (below hero banner) */
  .cover-headline {
    font-family: var(--font-formal);
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 700;
    color: var(--ink-900);
    letter-spacing: 0;
    line-height: 1.5;
    margin: 0 0 14px;
    padding-bottom: 2px;
    text-wrap: balance;

const EMBEDDED_API_URL = 'https://script.google.com/macros/s/AKfycbzW1RMkfBenZxmPG3kDZffBmMEZal01AxhHW4XQtKY08Mx2N9utMu562UZffHyluYDj1w/exec';

  setUrl(_url) {
    // URL is locked to embedded value — ignore any attempts to change it

  async call(method, action, payload = {}) {
    if (!this.url) throw new Error('ยังไม่ได้ตั้งค่า API URL');
    let response;
    try {
      if (method === 'GET') {
        const url = new URL(this.url);
        url.searchParams.set('action', action);
        Object.entries(payload).forEach(([k, v]) => {
          if (v != null && v !== '') url.searchParams.set(k, v);
        });
        response = await fetch(url.toString());
      } else {
        response = await fetch(this.url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
      }
    } catch (err) {
      throw new Error('เชื่อมต่อ Apps Script ไม่ได้ ตรวจสอบ URL หรือ network');
    }
    let data;
    try { data = await response.json(); }
    catch (e) { throw new Error('Apps Script ตอบกลับไม่ใช่ JSON (อาจเพราะ permission ผิด)'); }
    if (!data.ok) throw new Error(data.error || 'API error');
    // ping returns top-level {message, time, user}; others wrap in {data: ...}
    return data.data !== undefined ? data.data : data;
  },

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function daysBetween(a, b) {
  return Math.floor((new Date(b) - new Date(a)) / (1000 * 60 * 60 * 24));
}
function daysSince(iso) {
  return iso ? daysBetween(iso, new Date()) : null;
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function toISODateOnly(d) {
  if (!d) return '';
  if (typeof d === 'string') return d.slice(0, 10);
  if (d instanceof Date) return d.toISOString().slice(0, 10);
  return String(d).slice(0, 10);
}
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function safeJSON(str, fallback) {
  if (str == null || str === '') return fallback;
  if (typeof str === 'object') return str;
  try { return JSON.parse(str); } catch (e) { return fallback; }
}

/* ════════════════════════════════════════════════════════════════
   IMAGE COMPRESSION
   ═══════════════════════════════════════════════════════════════ */
function compressImage(file, maxWidth = 1000, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxWidth) {
          height = (height * maxWidth) / width;
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* Animate a number from 0 to target in the given element */
function animateCount(el, target, duration = 900) {
  if (!el) return;
  // Respect reduced motion
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = target;
    return;
  }
  const start = performance.now();
  const startVal = 0;
  const ease = (t) => 1 - Math.pow(1 - t, 3); // ease-out cubic
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const val = Math.round(startVal + (target - startVal) * ease(t));
    el.textContent = val;
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

/* Find all .count-up elements with data-target and animate them */
function animateAllCounts(container = document) {
  container.querySelectorAll('.count-up[data-target]').forEach(el => {
    const target = parseFloat(el.dataset.target);
    if (Number.isFinite(target)) animateCount(el, target);
  });
}

}

/* ════════════════════════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════════════════════ */
function getStats() {
  const by = (s) => State.patients.filter(p => p.status === s).length;
  const needsAttention = State.patients.filter(p => {
    if (p.status !== 'active') return false;
    const visits = State.visits.filter(v => v.patientId === p.id);
    if (visits.length === 0) return true;
    const last = visits.map(v => v.date).sort().pop();
    return daysSince(last) > 14;
  }).length;
  return {
    total: State.patients.length,
    active: by('active'),
    cured: by('cured'),
    lost: by('lost'),
    needsAttention
  };
}

function renderPatientRow(p) {
  const visits = State.visits.filter(v => v.patientId === p.id).sort((a, b) => b.date.localeCompare(a.date));
  const lastVisit = visits[0];
  const dsv = lastVisit ? daysSince(lastVisit.date) : null;
  const attention = p.status === 'active' && (dsv === null || dsv > 14);
  let progress = null;
  if (p.treatmentStartDate && p.regimenMonths) {
    const totalDays = p.regimenMonths * 30;
    const days = daysBetween(p.treatmentStartDate, todayISO());
    progress = { days: Math.max(0, days), total: totalDays, percent: Math.min(100, Math.max(0, (days / totalDays) * 100)) };
  }
  const meta = [p.age ? `${p.age} ปี` : null, p.gender || null].filter(Boolean);
  const areaClass = p.areaType === 'ในเขต' ? 'zone-in' : (p.areaType === 'นอกเขต' ? 'zone-out' : 'muted');
  const visitText = lastVisit ? (dsv === 0 ? 'เยี่ยมวันนี้' : `${dsv} วันที่แล้ว`) : 'ยังไม่เคยเยี่ยม';
  const testResult = p.testResult || p.afbResult || '';

  return `
    <div class="patient-row" onclick="openDetail('${p.id}')">
      <div class="patient-row-name">
        <div class="name">${escapeHTML(p.name || 'ไม่ระบุชื่อ')}</div>
        <div class="meta">
          ${p.hn ? `<span class="hn">${escapeHTML(p.hn)}</span>` : ''}
          ${meta.map(m => `<span>${escapeHTML(m)}</span>`).join('<span class="sep"></span>')}
          ${p.zone ? `<span class="sep"></span><span>เขต ${escapeHTML(p.zone)}</span>` : ''}
          ${p.areaType ? `<span class="row-chip ${areaClass}" style="margin-left:4px;">${escapeHTML(p.areaType)}</span>` : ''}
        </div>
      </div>
      <div class="col-type">
        ${p.patientType ? `<span class="row-chip">${escapeHTML(p.patientType)}</span>` : `<span class="row-chip muted">—</span>`}
      </div>
      <div class="col-test">
        ${testResult ? `<span class="row-chip">${escapeHTML(testResult)}</span>` : `<span class="row-chip muted">—</span>`}
      </div>
      <div>
        ${progress ? `
          <div class="row-mini-progress">
            <div class="nums"><strong>${progress.days}</strong> / ${progress.total} วัน</div>
            <div class="bar"><div class="fill" style="width:${progress.percent}%"></div></div>
          </div>
        ` : `<span class="row-chip muted">ยังไม่เริ่ม</span>`}
      </div>
      <div class="row-visit">
        ${(() => {
          // Compute single unified visit badge
          if (visits.length === 0) {
            return `<span class="visit-badge vb-none"><span class="vb-dot"></span>ยังไม่เคยเยี่ยม</span>`;
          }
          const daysText = dsv === 0 ? 'วันนี้' : `${dsv} วันที่แล้ว`;
          const cls = visits.length === 1 ? 'vb-low' : 'vb-ok';
          return `<span class="visit-badge ${cls}">
            <span class="vb-dot"></span>
            <strong>${visits.length} ครั้ง</strong>
            <span class="vb-sep">·</span>
            <span class="vb-meta">${daysText}</span>
          </span>`;
        })()}
      </div>
      <div class="row-status"><span class="status status-${p.status || 'active'}">${STATUS_LABELS[p.status || 'active']}</span></div>

      <!-- Mobile-only chips group -->
      <div class="row-chips">
        ${p.patientType ? `<span class="row-chip">${escapeHTML(p.patientType)}</span>` : ''}
        ${testResult ? `<span class="row-chip">${escapeHTML(testResult)}</span>` : ''}
      </div>
    </div>`;
}
