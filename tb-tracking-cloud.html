<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบติดตามผู้ป่วยวัณโรค | TB Patient Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ec;
    --bg-elevated: #fdfbf6;
    --surface: #ffffff;
    --ink-900: #1a2620;
    --ink-700: #3d4d44;
    --ink-500: #6b7770;
    --ink-300: #a8b1ab;
    --ink-200: #d4d8d3;
    --border: #e6e2d8;
    --border-strong: #cfcabd;

    --primary: #2d4f3f;
    --primary-soft: #e4ede7;
    --primary-dark: #1d3a2c;

    --accent: #c97560;
    --accent-soft: #f5e4dd;

    --warning: #c89832;
    --warning-soft: #f5ecd5;

    --danger: #b3463e;
    --danger-soft: #f5dcd9;

    --success: #4a7a5a;
    --success-soft: #dfeae1;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 22px;

    --shadow-sm: 0 1px 2px rgba(26, 38, 32, 0.04), 0 1px 3px rgba(26, 38, 32, 0.06);
    --shadow: 0 4px 12px rgba(26, 38, 32, 0.06), 0 1px 2px rgba(26, 38, 32, 0.04);
    --shadow-lg: 0 12px 32px rgba(26, 38, 32, 0.12), 0 4px 8px rgba(26, 38, 32, 0.06);

    --font-thai: "IBM Plex Sans Thai", system-ui, sans-serif;
    --font-display: "Outfit", "IBM Plex Sans Thai", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink-900);
    font-family: var(--font-thai);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(ellipse 1200px 600px at 0% 0%, rgba(45, 79, 63, 0.04), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 100%, rgba(201, 117, 96, 0.04), transparent 60%);
  }

  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

  /* ── HEADER ────────────────────────────────────────────────── */
  .app-header {
    background: linear-gradient(180deg, var(--bg-elevated) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 0 20px;
    margin-bottom: 20px;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--primary);
    display: grid;
    place-items: center;
    color: #f7f3ec;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 20px;
    box-shadow: var(--shadow);
  }
  .brand-text h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .brand-text p {
    font-size: 13px;
    color: var(--ink-500);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-500);
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  .sync-dot.syncing { background: var(--warning); animation: spin 0.7s linear infinite; }
  .sync-dot.error { background: var(--danger); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-indicator button {
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border-left: 1px solid var(--border);
    padding-left: 8px;
    margin-left: 4px;
    transition: color 0.15s;
  }
  .sync-indicator button:hover { color: var(--primary-dark); }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    color: var(--ink-500);
    display: grid;
    place-items: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bg-elevated); color: var(--ink-900); }

  /* ── MAIN LAYOUT ───────────────────────────────────────────── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* ── STATS GRID ────────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .stat-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--c, var(--primary));
  }
  .stat-label {
    font-size: 12px;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .stat-value .unit {
    font-size: 13px;
    color: var(--ink-500);
    font-weight: 400;
    margin-left: 4px;
  }

  /* ── TOOLBAR ───────────────────────────────────────────────── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 260px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(45, 79, 63, 0.1);
  }
  .search-box svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-300);
  }

  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #f7f3ec; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink-700);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .btn-ghost {
    color: var(--ink-700);
    padding: 8px 12px;
  }
  .btn-ghost:hover { background: var(--primary-soft); color: var(--primary-dark); }
  .btn-danger {
    background: var(--surface);
    color: var(--danger);
    border: 1px solid var(--danger-soft);
  }
  .btn-danger:hover { background: var(--danger-soft); }

  /* ── FILTER TABS ───────────────────────────────────────────── */
  .filters {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    padding: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }
  .filter-btn {
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    color: var(--ink-700);
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
  }
  .filter-btn:hover { color: var(--primary-dark); }
  .filter-btn.active {
    background: var(--surface);
    color: var(--primary-dark);
    box-shadow: var(--shadow-sm);
  }
  .filter-btn .count {
    margin-left: 6px;
    font-size: 11px;
    color: var(--ink-500);
    font-variant-numeric: tabular-nums;
  }
  .filter-btn.active .count { color: var(--primary); }

  /* ── PATIENT LIST ──────────────────────────────────────────── */
  .patient-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .patient-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .patient-card:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .patient-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .patient-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: -0.2px;
    margin-bottom: 3px;
  }
  .patient-meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--ink-500);
    align-items: center;
  }
  .patient-meta .sep {
    width: 3px;
    height: 3px;
    background: var(--ink-300);
    border-radius: 50%;
  }
  .hn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-700);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .status {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.3px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-active { background: var(--primary-soft); color: var(--primary-dark); }
  .status-cured { background: var(--success-soft); color: var(--success); }
  .status-treatmentComplete { background: #dbeafe; color: #1e40af; }
  .status-lost { background: var(--warning-soft); color: var(--warning); }
  .status-transferred { background: #e8e3f0; color: #5d4a8a; }
  .status-died { background: #ebe7e4; color: #5a4a44; }
  .status-diagnosisChange { background: #fef3c7; color: #92400e; }

  .treatment-progress {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-500);
    margin-bottom: 6px;
  }
  .progress-label strong { color: var(--ink-900); font-weight: 600; font-variant-numeric: tabular-nums; }
  .progress-bar {
    height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .patient-footer {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-500);
  }
  .last-visit-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .alert-tag { color: var(--accent); font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-500);
  }
  .empty-state-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: var(--bg-elevated);
    display: grid;
    place-items: center;
    color: var(--ink-300);
  }
  .empty-state h3 {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--ink-700);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .empty-state p { font-size: 14px; max-width: 320px; margin: 0 auto 20px; }

  /* ── DETAIL VIEW ───────────────────────────────────────────── */
  .detail-view { animation: slideIn 0.25s ease; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .detail-header::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--primary-soft) 0%, transparent 70%);
    opacity: 0.6;
    pointer-events: none;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-500);
    margin-bottom: 12px;
  }
  .breadcrumb button {
    color: var(--primary);
    font-weight: 500;
    padding: 4px 8px;
    margin: -4px -8px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .breadcrumb button:hover { background: var(--primary-soft); }

  .detail-name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .detail-subline {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink-500);
    font-size: 14px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    overflow-x: auto;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 6px 6px 0;
  }
  .tab {
    padding: 12px 18px;
    font-size: 14px;
    color: var(--ink-500);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    font-weight: 500;
    white-space: nowrap;
    position: relative;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink-900); }
  .tab.active {
    color: var(--primary-dark);
    border-bottom-color: var(--primary);
  }
  .tab .badge {
    display: inline-block;
    min-width: 18px;
    padding: 1px 6px;
    background: var(--primary-soft);
    color: var(--primary-dark);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
    text-align: center;
  }
  .tab-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: 24px 28px;
    min-height: 320px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 18px 28px;
    margin-bottom: 24px;
  }
  .info-item { display: flex; flex-direction: column; gap: 3px; }
  .info-item .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--ink-500);
    font-weight: 500;
  }
  .info-item .value {
    font-size: 15px;
    color: var(--ink-900);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .info-item .value.empty {
    color: var(--ink-300);
    font-style: italic;
    font-weight: 400;
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    margin-top: 24px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-title h3 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title h3 .num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-500);
    font-weight: 400;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 999px;
  }

  .visit-list { display: flex; flex-direction: column; gap: 12px; }
  .visit-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    transition: border-color 0.15s;
  }
  .visit-card:hover { border-color: var(--border-strong); }
  .visit-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 12px;
  }
  .visit-date { display: flex; flex-direction: column; }
  .visit-date .date {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .visit-date .who {
    font-size: 12px;
    color: var(--ink-500);
    margin-top: 2px;
  }
  .visit-status-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--bg);
    color: var(--ink-700);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .pill-ok { background: var(--success-soft); color: var(--success); }
  .pill-warn { background: var(--warning-soft); color: var(--warning); }
  .pill-bad { background: var(--danger-soft); color: var(--danger); }

  .symptom-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }
  .visit-notes {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    font-size: 14px;
    color: var(--ink-700);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .photo-strip {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .photo-thumb {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    background-color: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .photo-thumb:hover { transform: scale(1.05); }

  /* DOT Calendar */
  .dot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 6px;
    margin-top: 16px;
  }
  .dot-day {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--bg);
    display: grid;
    place-items: center;
    font-size: 11px;
    color: var(--ink-500);
    cursor: pointer;
    transition: all 0.12s;
    font-variant-numeric: tabular-nums;
    border: 1px solid transparent;
    font-weight: 500;
  }
  .dot-day:hover { border-color: var(--border-strong); transform: scale(1.05); }
  .dot-day.taken { background: var(--success); color: white; }
  .dot-day.missed { background: var(--danger); color: white; }
  .dot-day.today { border-color: var(--primary); border-width: 2px; }
  .dot-day.future { opacity: 0.35; cursor: not-allowed; }

  .dot-legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--ink-500);
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .timeline {
    position: relative;
    padding-left: 20px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 6px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: var(--border);
  }
  .timeline-item { position: relative; padding-bottom: 18px; }
  .timeline-item::before {
    content: "";
    position: absolute;
    left: -18px;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;

   API LAYER — ติดต่อกับ Google Apps Script Web App
   ═══════════════════════════════════════════════════════════════ */
const API_URL_KEY = 'tb_api_url';

const API = {
  url: localStorage.getItem(API_URL_KEY) || '',

  setUrl(url) {
    this.url = (url || '').trim();
    if (this.url) localStorage.setItem(API_URL_KEY, this.url);
    else localStorage.removeItem(API_URL_KEY);
  },

  async call(method, action, payload = {}) {
    if (!this.url) throw new Error('ยังไม่ได้ตั้งค่า API URL');
    let response;
    try {
      if (method === 'GET') {
        const url = new URL(this.url);
        url.searchParams.set('action', action);
        Object.entries(payload).forEach(([k, v]) => {
          if (v != null && v !== '') url.searchParams.set(k, v);
        });
        response = await fetch(url.toString());
      } else {
        response = await fetch(this.url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
      }
    } catch (err) {
      throw new Error('เชื่อมต่อ Apps Script ไม่ได้ ตรวจสอบ URL หรือ network');
    }
    let data;
    try { data = await response.json(); }
    catch (e) { throw new Error('Apps Script ตอบกลับไม่ใช่ JSON (อาจเพราะ permission ผิด)'); }
    if (!data.ok) throw new Error(data.error || 'API error');
    // ping returns top-level {message, time, user}; others wrap in {data: ...}
    return data.data !== undefined ? data.data : data;
  },

  ping()                              { return this.call('GET', 'ping'); },
  getConfig()                         { return this.call('GET', 'getConfig'); },
  listPatients()                      { return this.call('GET', 'listPatients'); },
  addPatient(data)                    { return this.call('POST', 'addPatient', { data }); },

  uploadPhoto(filename, base64, pid)  { return this.call('POST', 'uploadPhoto', { filename, base64, patientId: pid }); }
};

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function daysBetween(a, b) {
  return Math.floor((new Date(b) - new Date(a)) / (1000 * 60 * 60 * 24));
}
function daysSince(iso) {
  return iso ? daysBetween(iso, new Date()) : null;
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function toISODateOnly(d) {
  if (!d) return '';
  if (typeof d === 'string') return d.slice(0, 10);
  if (d instanceof Date) return d.toISOString().slice(0, 10);
  return String(d).slice(0, 10);
}
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function safeJSON(str, fallback) {
  if (str == null || str === '') return fallback;
  if (typeof str === 'object') return str;
  try { return JSON.parse(str); } catch (e) { return fallback; }
}

// Normalize visit from API (parse JSON strings from Sheet)
function normalizeVisit(v) {
  return {
    ...v,
    date: toISODateOnly(v.date),
    symptoms: safeJSON(v.symptoms, {}),
    photos: safeJSON(v.photos, []),
    medicationTaken: v.medicationTaken === true || v.medicationTaken === 'TRUE' || v.medicationTaken === 'true' ? true
                  : (v.medicationTaken === false || v.medicationTaken === 'FALSE' || v.medicationTaken === 'false' ? false : null)
  };
}

// Normalize patient from API
function normalizePatient(p) {
  return {
    ...p,
    diagnosisDate: toISODateOnly(p.diagnosisDate),
    treatmentStartDate: toISODateOnly(p.treatmentStartDate),
    regimenMonths: parseInt(p.regimenMonths) || 6,
    householdContacts: safeJSON(p.householdContacts, [])
  };
}

function fullAddress(p) {
  const parts = [
    p.addrNo,
    p.addrMoo ? `ม.${p.addrMoo}` : '',
    p.addrTambon ? `ต.${p.addrTambon}` : '',
    p.addrAmphoe ? `อ.${p.addrAmphoe}` : '',
    p.addrProvince ? `จ.${p.addrProvince}` : ''
  ].filter(Boolean);
  return parts.length ? parts.join(' ') : (p.address || '');
}

/* ════════════════════════════════════════════════════════════════
   IMAGE COMPRESSION
   ═══════════════════════════════════════════════════════════════ */
function compressImage(file, maxWidth = 1000, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxWidth) {
          height = (height * maxWidth) / width;
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function toast(msg, type = '', ms = 2800) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast ${type}">${escapeHTML(msg)}</div>`;
  setTimeout(() => { if (root.firstChild) root.innerHTML = ''; }, ms);
}

function showLoading(msg = 'กำลังโหลด...') {
  document.getElementById('loadingRoot').innerHTML = `
    <div class="loading-overlay">
      <div class="loading-card">
        <div class="spinner"></div>
        <span>${escapeHTML(msg)}</span>
      </div>
    </div>`;
}
function hideLoading() {
  document.getElementById('loadingRoot').innerHTML = '';
}

function setSyncState(state, msg) {
  const indicator = document.getElementById('syncIndicator');
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (!indicator) return;
  indicator.style.display = 'flex';
  dot.className = 'sync-dot ' + (state === 'ok' ? '' : state);
  text.textContent = msg;
}

/* ════════════════════════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════════════════════ */
function getStats() {
  const by = (s) => State.patients.filter(p => p.status === s).length;
  const needsAttention = State.patients.filter(p => {
    if (p.status !== 'active') return false;
    const visits = State.visits.filter(v => v.patientId === p.id);
    if (visits.length === 0) return true;
    const last = visits.map(v => v.date).sort().pop();
    return daysSince(last) > 14;
  }).length;
  return {
    total: State.patients.length,
    active: by('active'),
    cured: by('cured'),
    lost: by('lost'),
    needsAttention
  };
}

function renderPatientCard(p) {
  const visits = State.visits.filter(v => v.patientId === p.id).sort((a, b) => b.date.localeCompare(a.date));
  const lastVisit = visits[0];
  const dsv = lastVisit ? daysSince(lastVisit.date) : null;
  const attention = p.status === 'active' && (dsv === null || dsv > 14);
  let progress = null;
  if (p.treatmentStartDate && p.regimenMonths) {
    const totalDays = p.regimenMonths * 30;
    const days = daysBetween(p.treatmentStartDate, todayISO());
    progress = { days: Math.max(0, days), total: totalDays, percent: Math.min(100, Math.max(0, (days / totalDays) * 100)) };
  }
  const meta = [p.age ? `${p.age} ปี` : null, p.gender || null].filter(Boolean);

  return `
    <div class="patient-card" onclick="openDetail('${p.id}')">
      <div class="patient-card-top">
        <div>
          <div class="patient-name">${escapeHTML(p.name || 'ไม่ระบุชื่อ')}</div>
          <div class="patient-meta">
            ${p.hn ? `<span class="hn">${escapeHTML(p.hn)}</span>` : ''}
            ${meta.map(m => `<span>${escapeHTML(m)}</span>`).join('<span class="sep"></span>')}
          </div>
        </div>
        <span class="status status-${p.status || 'active'}">${STATUS_LABELS[p.status || 'active']}</span>
      </div>
      ${progress ? `
        <div class="treatment-progress">
          <div class="progress-label">
            <span>การรักษา</span>
            <span><strong>${progress.days}</strong> / ${progress.total} วัน</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${progress.percent}%"></div></div>
        </div>` : ''}
      <div class="patient-footer">
        <span class="last-visit-tag">
          ${ICON.calendar}
          ${lastVisit ? `เยี่ยมล่าสุด ${dsv === 0 ? 'วันนี้' : dsv + ' วันที่แล้ว'}` : 'ยังไม่มีการเยี่ยมบ้าน'}
        </span>
        ${attention ? `<span class="alert-tag">${ICON.alert} ต้องติดตาม</span>` : `<span class="text-muted">${visits.length} ครั้ง</span>`}
      </div>
    </div>`;
}

        </div>` : ''}

function renderMedicationTab(p, visits) {
  if (!p.treatmentStartDate) {
    return `
      <div class="empty-state" style="padding: 60px 20px;">
        <div class="empty-state-icon">${ICON.pill}</div>
        <h3>ยังไม่มีข้อมูลการรักษา</h3>
        <p>กรุณาระบุวันที่เริ่มรักษาในข้อมูลผู้ป่วย</p>
        <button class="btn btn-primary" onclick="openPatientModal('${p.id}')">${ICON.edit} แก้ไขข้อมูล</button>
      </div>`;
  }
  const medStatus = {};
  visits.forEach(v => {
    if (v.medicationTaken === true) medStatus[v.date] = 'taken';
    else if (v.medicationTaken === false) medStatus[v.date] = 'missed';
  });
  const startDate = new Date(p.treatmentStartDate);
  const months = p.regimenMonths || 6;
  const totalDays = months * 30;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  startDate.setHours(0, 0, 0, 0);
  let takenCount = 0, missedCount = 0, recordedDays = 0;
  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const status = medStatus[iso];
    const isFuture = d > today;
    const isToday = d.getTime() === today.getTime();
    days.push({ iso, day: d.getDate(), status, isFuture, isToday });
    if (status === 'taken') takenCount++;
    if (status === 'missed') missedCount++;
    if (status) recordedDays++;
  }
  const adherence = recordedDays > 0 ? Math.round((takenCount / recordedDays) * 100) : 0;
  const daysSinceStart = Math.max(0, daysBetween(p.treatmentStartDate, todayISO()));

  return `
    <div class="section-title"><h3>การกินยา (DOT) <span class="num">${months} เดือน</span></h3></div>
    <div class="stats" style="margin-bottom: 18px;">
      <div class="stat-card" style="--c: var(--success)"><div class="stat-label">กินยา</div><div class="stat-value">${takenCount}<span class="unit">มื้อ</span></div></div>
      <div class="stat-card" style="--c: var(--danger)"><div class="stat-label">ขาดยา</div><div class="stat-value">${missedCount}<span class="unit">มื้อ</span></div></div>
      <div class="stat-card" style="--c: var(--primary)"><div class="stat-label">รักษามาแล้ว</div><div class="stat-value">${daysSinceStart}<span class="unit">วัน</span></div></div>
      <div class="stat-card" style="--c: var(--accent)"><div class="stat-label">Adherence</div><div class="stat-value">${adherence}<span class="unit">%</span></div></div>
    </div>
    <div style="background: var(--bg-elevated); padding: 18px; border-radius: 12px; border: 1px solid var(--border);">
      <div style="font-size: 13px; color: var(--ink-500); margin-bottom: 12px;">
        ตารางบันทึก ${months} เดือน · เริ่ม ${fmtDate(p.treatmentStartDate)} (กดที่ช่องเพื่อบันทึก)
      </div>
      <div class="dot-grid">
        ${days.map(d => `<div class="dot-day ${d.status || ''} ${d.isToday ? 'today' : ''} ${d.isFuture ? 'future' : ''}" onclick="${d.isFuture ? '' : `toggleDotDay('${d.iso}')`}" title="${fmtDate(d.iso)}${d.status ? ' · ' + (d.status === 'taken' ? 'กินยา' : 'ขาดยา') : ''}">${d.day}</div>`).join('')}
      </div>
      <div class="dot-legend">
        <span class="legend-item"><span class="legend-dot" style="background: var(--success)"></span>กินยา</span>
        <span class="legend-item"><span class="legend-dot" style="background: var(--danger)"></span>ขาดยา</span>
        <span class="legend-item"><span class="legend-dot" style="background: var(--bg); border: 1px solid var(--border-strong);"></span>ยังไม่บันทึก</span>
        <span class="legend-item"><span class="legend-dot" style="background: transparent; border: 2px solid var(--primary)"></span>วันนี้</span>
      </div>
    </div>`;
}

function renderSymptomsTab(p, visits) {
  const events = [];
  visits.forEach(v => {
    const syms = Object.entries(v.symptoms || {}).filter(([_, val]) => val).map(([k]) => SYMPTOM_LABELS[k]).filter(Boolean);
    if (syms.length > 0 || v.sideEffects) {
      events.push({
        date: v.date, symptoms: syms, sideEffects: v.sideEffects,
        warn: syms.includes('ไอเป็นเลือด') || syms.includes('เจ็บหน้าอก')
      });
    }
  });
  events.sort((a, b) => b.date.localeCompare(a.date));
  const freq = {};
  visits.forEach(v => {
    Object.entries(v.symptoms || {}).forEach(([k, val]) => {
      if (val) freq[k] = (freq[k] || 0) + 1;
    });
  });
  const freqSorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);

  return `
    <div class="section-title"><h3>สรุปอาการที่พบ</h3></div>
    ${freqSorted.length === 0 ? `
      <div style="padding: 24px; background: var(--success-soft); border-radius: 10px; color: var(--success); display: flex; align-items: center; gap: 10px;">✓ ไม่พบอาการผิดปกติจากการเยี่ยมบ้าน</div>
    ` : `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px;">
        ${freqSorted.map(([k, count]) => `<div style="background: var(--bg-elevated); padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;"><span style="font-size: 14px;">${SYMPTOM_LABELS[k] || k}</span><span style="font-family: var(--font-mono); font-weight: 600; color: var(--accent);">${count}×</span></div>`).join('')}
      </div>
    `}
    <div class="section-title" style="margin-top: 28px;"><h3>Timeline อาการ</h3></div>
    ${events.length === 0 ? `<div class="text-muted" style="padding: 30px; text-align: center;">— ยังไม่มีบันทึกอาการ —</div>` : `
      <div class="timeline">
        ${events.map(e => `
          <div class="timeline-item ${e.warn ? 'warn' : ''}">
            <div class="timeline-date">${fmtDate(e.date)}</div>
            <div class="timeline-content">
              ${e.symptoms.length > 0 ? `<div class="symptom-chips" style="margin-top: 4px;">${e.symptoms.map(s => `<span class="pill pill-warn">${escapeHTML(s)}</span>`).join('')}</div>` : ''}
              ${e.sideEffects ? `<div style="margin-top: 6px; font-size: 13px; color: var(--ink-700);"><em>ผลข้างเคียง:</em> ${escapeHTML(e.sideEffects)}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    `}`;
}

let householdContacts = [];

function renderHouseholdList() {
  const list = document.getElementById('householdList');
  const count = document.getElementById('hcCount');
  if (count) count.textContent = householdContacts.length;
  if (!list) return;
  if (householdContacts.length === 0) {
    list.innerHTML = '<div class="contact-empty">ยังไม่มีผู้สัมผัสร่วมบ้าน — กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
    return;
  }
  list.innerHTML = householdContacts.map((c, i) => `
    <div class="contact-card">
      <div class="contact-card-head">
        <span>ผู้สัมผัสคนที่ ${i + 1}</span>
        <button type="button" class="contact-remove" onclick="removeHouseholdContact(${i})" title="ลบ">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>ชื่อ-นามสกุล</label><input class="input" oninput="updateHC(${i},'name',this.value)" value="${escapeHTML(c.name || '')}" placeholder="ชื่อ-นามสกุล"></div>
        <div class="form-group"><label>อายุ</label><input class="input" type="number" oninput="updateHC(${i},'age',this.value)" value="${escapeHTML(c.age || '')}" placeholder="—"></div>
        <div class="form-group"><label>วันที่ CXR</label><input class="input" type="date" onchange="updateHC(${i},'cxrDate',this.value)" value="${escapeHTML(c.cxrDate || '')}"></div>
        <div class="form-group"><label>วันที่ตรวจ IGRAs</label><input class="input" type="date" onchange="updateHC(${i},'igraDate',this.value)" value="${escapeHTML(c.igraDate || '')}"></div>
        <div class="form-group"><label>ผล IGRAs</label>
          <select class="select" onchange="updateHC(${i},'igraResult',this.value)">
            <option value="">—</option>
            ${IGRA_RESULTS.map(r => `<option value="${r}" ${c.igraResult === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  `).join('');
}

function addHouseholdContact() {
  householdContacts.push({ name: '', age: '', cxrDate: '', igraDate: '', igraResult: '' });
  renderHouseholdList();
}

function removeHouseholdContact(i) {
  householdContacts.splice(i, 1);
  renderHouseholdList();
}

function updateHC(i, field, value) {
  if (householdContacts[i]) householdContacts[i][field] = value;
}

function toggleTransferTo() {
  const status = document.getElementById('f-status');
  const row = document.getElementById('transferToRow');
  if (status && row) row.style.display = (status.value === 'transferred') ? 'grid' : 'none';
}

async function savePatient(id) {
  const get = (k) => document.getElementById('f-' + k).value.trim();
  const name = get('name');
  if (!name) { toast('กรุณากรอกชื่อผู้ป่วย', 'error'); document.getElementById('f-name').focus(); return; }

  const status = get('status') || 'active';
  const cleanedContacts = householdContacts
    .map(c => ({
      name: (c.name || '').trim(),
      age: (c.age || '').toString().trim(),
      cxrDate: (c.cxrDate || '').trim(),
      igraDate: (c.igraDate || '').trim(),
      igraResult: (c.igraResult || '').trim()
    }))
    .filter(c => c.name || c.age || c.cxrDate || c.igraDate || c.igraResult);

  const data = {
    name, hn: get('hn'), age: get('age'), gender: get('gender'), phone: get('phone'),
    addrNo: get('addrNo'), addrMoo: get('addrMoo'), addrTambon: get('addrTambon'),
    addrAmphoe: get('addrAmphoe'), addrProvince: get('addrProvince'),
    zone: get('zone'), contactPerson: get('contact'),
    treatmentStartDate: get('treatmentStartDate'),
    regimen: get('regimen'), regimenMonths: parseInt(get('regimenMonths')) || 6,
    testResult: get('testResult'), patientType: get('patientType'),
    status, transferTo: status === 'transferred' ? get('transferTo') : '',
    householdContacts: cleanedContacts,
    notes: get('notes')
  };
  // Build combined address string for backward compatibility (legacy 'address' column)
  data.address = fullAddress(data);
  // Keep legacy 'afbResult' in sync with new testResult (backward compat for old rows/columns)
  data.afbResult = data.testResult;

  const btn = document.getElementById('savePatientBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  try {
    if (State.demo) {
      if (id) {
        const idx = State.patients.findIndex(p => p.id === id);
        if (idx >= 0) State.patients[idx] = normalizePatient({ ...State.patients[idx], ...data, id, updatedAt: todayISO() });
        toast('บันทึกการแก้ไข (Demo)', 'success');
      } else {
        const created = normalizePatient({ ...data, id: 'demo-' + Date.now(), createdBy: 'Demo', updatedAt: todayISO() });
        State.patients.unshift(created);
        State.currentPatientId = created.id;
        State.view = 'detail';
        State.currentTab = 'info';
        toast('เพิ่มผู้ป่วย (Demo)', 'success');
      }
    } else if (id) {
      const updated = await API.updatePatient(id, data);
      const idx = State.patients.findIndex(p => p.id === id);
      if (idx >= 0) State.patients[idx] = normalizePatient(updated);
      toast('บันทึกการแก้ไขแล้ว', 'success');
    } else {
      const created = await API.addPatient(data);
      State.patients.unshift(normalizePatient(created));
      State.currentPatientId = created.id;
      State.view = 'detail';
      State.currentTab = 'info';
      toast('เพิ่มผู้ป่วยเรียบร้อย', 'success');
    }
    closeModal();
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 4000);
    btn.disabled = false;
    btn.textContent = id ? 'บันทึกการแก้ไข' : 'เพิ่มผู้ป่วย';
  }
}

function setMedStatus(s) {
  document.getElementById('v-med-taken').classList.toggle('active', s === true);

  document.getElementById('v-med-none').classList.toggle('active', s === null);

function toggleSymptom(key) {
  const el = document.querySelector(`[data-sym="${key}"]`);
  if (el) el.classList.toggle('checked');
}

async function handlePhotoUpload(e) {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  toast(`กำลังเตรียม ${files.length} รูป...`);
  for (const f of files) {
    try {
      const compressed = await compressImage(f, 1000, 0.75);
      visitPhotos.push({ base64: compressed, name: f.name, isNew: true });
    } catch (err) { console.error(err); }
  }
  refreshPhotoPreview();
  e.target.value = '';
}

function refreshPhotoPreview() {
  const grid = document.getElementById('v-photo-preview');
  if (!grid) return;
  grid.innerHTML = visitPhotos.map((p, i) => {
    const src = p.url || p.base64;
    return `<div class="photo-preview" style="background-image: url('${src}')"><button type="button" class="photo-remove" onclick="removePhoto(${i})" title="ลบ">${ICON.close}</button></div>`;
  }).join('');
}

function removePhoto(i) { visitPhotos.splice(i, 1); refreshPhotoPreview(); }

async function saveVisit(id) {
  const get = (k) => document.getElementById('v-' + k).value.trim();
  const date = get('date');
  if (!date) { toast('กรุณาเลือกวันที่เยี่ยม', 'error'); return; }

  const symptoms = {};
  document.querySelectorAll('#v-symptoms .check-item').forEach(el => {
    if (el.classList.contains('checked')) symptoms[el.dataset.sym] = true;
  });

  let medicationTaken = null;
  if (document.getElementById('v-med-taken').classList.contains('active')) medicationTaken = true;
  else if (document.getElementById('v-med-missed').classList.contains('active')) medicationTaken = false;

  const btn = document.getElementById('saveVisitBtn');
  btn.disabled = true;

  // Step 1: Upload new photos
  const newPhotos = visitPhotos.filter(p => p.isNew && p.base64);
  const existingPhotos = visitPhotos.filter(p => !p.isNew);
  const uploadedPhotos = [];

  if (newPhotos.length > 0) {
    btn.textContent = `อัพโหลดรูป 1/${newPhotos.length}...`;
    for (let i = 0; i < newPhotos.length; i++) {
      btn.textContent = `อัพโหลดรูป ${i + 1}/${newPhotos.length}...`;
      try {
        const result = await API.uploadPhoto(newPhotos[i].name, newPhotos[i].base64, State.currentPatientId);
        uploadedPhotos.push({ fileId: result.fileId, url: result.url, name: result.name });
      } catch (err) {
        toast(`อัพโหลดรูปที่ ${i + 1} ไม่สำเร็จ: ${err.message}`, 'error', 4000);
        btn.disabled = false;
        btn.textContent = id ? 'บันทึกการแก้ไข' : 'บันทึกการเยี่ยม';
        return;
      }
    }
  }

  btn.textContent = 'บันทึก...';
  const allPhotos = [...existingPhotos, ...uploadedPhotos];

  const data = {
    patientId: State.currentPatientId,
    date,
    visitorName: get('visitorName'),
    visitorRole: get('visitorRole'),
    medicationTaken,
    missedDoses: parseInt(get('missedDoses')) || 0,
    symptoms,
    sideEffects: get('sideEffects'),
    weight: get('weight'),
    bloodPressure: get('bloodPressure'),
    temperature: get('temperature'),
    notes: get('notes'),
    photos: allPhotos
  };

  try {
    const created = await API.addVisit(data);
    State.visits.unshift(normalizeVisit(created));
    toast('บันทึกการเยี่ยมบ้านเรียบร้อย', 'success');
    visitPhotos = [];
    closeModal();
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 4000);
    btn.disabled = false;
    btn.textContent = id ? 'บันทึกการแก้ไข' : 'บันทึกการเยี่ยม';
  }
}

async function deletePatient(id) {
  const p = State.patients.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`ลบ "${p.name}" และข้อมูลการเยี่ยมบ้านทั้งหมด?\nไม่สามารถย้อนกลับได้`)) return;
  showLoading('กำลังลบ...');
  try {
    await API.deletePatient(id);
    State.patients = State.patients.filter(x => x.id !== id);
    State.visits = State.visits.filter(v => v.patientId !== id);
    State.view = 'list';
    toast('ลบผู้ป่วยเรียบร้อย', 'success');
    render();
  } catch (err) {
    toast('ลบไม่สำเร็จ: ' + err.message, 'error', 4000);
  } finally { hideLoading(); }
}

  showLoading('กำลังลบ...');

    await API.deleteVisit(id);
    State.visits = State.visits.filter(v => v.id !== id);

// Quick DOT toggle — saves as a minimal visit record
async function toggleDotDay(iso) {
  const existing = State.visits.find(v => v.patientId === State.currentPatientId && v.date === iso);
  showLoading('บันทึก...');
  try {
    if (existing) {
      // Cycle: taken → missed → no record (delete)
      if (existing.medicationTaken === true) {
        // Need to update — for simplicity, delete and re-add as missed
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
        const created = await API.addVisit({
          patientId: State.currentPatientId, date: iso, medicationTaken: false,
          symptoms: {}, photos: [], visitorName: '(quick entry)'
        });
        State.visits.push(normalizeVisit(created));
      } else if (existing.medicationTaken === false) {
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
      } else {
        // null → taken
        await API.deleteVisit(existing.id);
        State.visits = State.visits.filter(v => v.id !== existing.id);
        const created = await API.addVisit({
          patientId: State.currentPatientId, date: iso, medicationTaken: true,
          symptoms: {}, photos: [], visitorName: '(quick entry)'
        });
        State.visits.push(normalizeVisit(created));
      }
    } else {
      const created = await API.addVisit({
        patientId: State.currentPatientId, date: iso, medicationTaken: true,
        symptoms: {}, photos: [], visitorName: '(quick entry)'
      });
      State.visits.push(normalizeVisit(created));
    }
    render();
  } catch (err) {
    toast('บันทึกไม่สำเร็จ: ' + err.message, 'error', 3000);
  } finally { hideLoading(); }
}

function viewImage(visitId, idx) {

  try {

   DATA LOADING
   ═══════════════════════════════════════════════════════════════ */
async function loadAll(silent = false) {
  if (State.syncing) return;
  State.syncing = true;
  setSyncState('syncing', 'กำลัง sync...');
  if (!silent) showLoading('กำลังโหลดข้อมูล...');
  try {
    const [patients, visits] = await Promise.all([API.listPatients(), API.listVisits()]);
    State.patients = (patients || []).map(normalizePatient);
    State.visits = (visits || []).map(normalizeVisit);
    State.lastSync = new Date();
    setSyncState('ok', `Sync ${State.lastSync.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`);
  } catch (err) {
    setSyncState('error', 'Sync ล้มเหลว');
    if (!silent) toast('ดึงข้อมูลไม่สำเร็จ: ' + err.message, 'error', 4000);
  } finally {
    State.syncing = false;
    if (!silent) hideLoading();
  }
}

async function refreshData() {
  await loadAll();
  render();
  toast('รีเฟรชข้อมูลแล้ว', 'success', 1800);
}

/* ════════════════════════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════════════════════ */
function render() {
  if (!API.url && !State.demo) { renderSetup(); return; }
  document.getElementById('settingsBtn').style.display = State.demo ? 'none' : 'grid';
  if (State.view === 'detail' && State.currentPatientId) renderDetail();
  else renderList();
}

/* ════════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
(async function init() {
  // Demo mode: ?demo=1 — preview the UI without backend (read-only, in-memory data)
  const isDemo = /[?&]demo=1\b/.test(location.search);
  if (isDemo) {
    State.demo = true;
    State.patients = DEMO_PATIENTS.map(normalizePatient);
    State.user = 'Demo';
    document.getElementById('settingsBtn').style.display = 'none';
    render();
    showDemoBanner();
    return;
  }

  if (!API.url) { renderSetup(); return; }
  document.getElementById('settingsBtn').style.display = 'grid';

  showLoading('กำลังเชื่อมต่อ Google Apps Script...');
  try {
    const ping = await API.ping();
    State.user = ping.user;
    await loadAll(true);
    hideLoading();
    render();
  } catch (err) {
    hideLoading();
    renderSetup(err.message);
  }

  // Auto-refresh when tab becomes visible (after >30s away)
  let hiddenAt = null;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) hiddenAt = Date.now();
    else if (hiddenAt && Date.now() - hiddenAt > 30000) {
      loadAll(true).then(() => render());
    }
  });

  // Background poll every 60s
  setInterval(() => {
    if (!document.hidden && API.url) loadAll(true).then(() => {
      if (State.view === 'list') renderList();
    });
  }, 60000);
})();

function showDemoBanner() {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2000;padding:8px 16px;background:#fef3c7;color:#92400e;border-bottom:1px solid #fcd34d;font-size:13px;font-weight:500;text-align:center;letter-spacing:.2px;';
  b.innerHTML = '🧪 โหมดทดลอง (Demo) — ข้อมูลตัวอย่างในหน่วยความจำเท่านั้น ไม่บันทึกไปยัง Google Sheets · <a href="' + location.pathname + '" style="color:#92400e;text-decoration:underline;">ออกจากโหมดทดลอง</a>';
  document.body.appendChild(b);
  document.body.style.paddingTop = '36px';
}
</script>
</body>
